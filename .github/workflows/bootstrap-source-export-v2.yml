name: bootstrap-source-export-v2

on:
  push:
    branches:
      - codex/bootstrap-source-export-b667901-v2
    paths:
      - .github/workflows/bootstrap-source-export-v2.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/bootstrap-source-export-v2.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/bootstrap-p1t6-4c239-v1
          fetch-depth: 1
      - name: Decode three-part Task 6 patch
        shell: bash
        run: |
          set +e
          set -u
          cat \
            .github/bootstrap/p1t6-4c239.patch.gz.b64.part00 \
            .github/bootstrap/p1t6-4c239.patch.gz.b64.part01 \
            .github/bootstrap/p1t6-4c239.patch.gz.b64.part02 \
            > "$RUNNER_TEMP/p1t6-4c239.patch.gz.b64"
          base64 --decode --ignore-garbage \
            "$RUNNER_TEMP/p1t6-4c239.patch.gz.b64" \
            > "$RUNNER_TEMP/p1t6-4c239.patch.gz"
          decode_rc=$?
          gzip -t "$RUNNER_TEMP/p1t6-4c239.patch.gz"
          gzip_rc=$?
          if [ "$gzip_rc" -eq 0 ]; then
            gzip -dc "$RUNNER_TEMP/p1t6-4c239.patch.gz" \
              > "$RUNNER_TEMP/p1t6-4c239.patch"
          else
            : > "$RUNNER_TEMP/p1t6-4c239.patch"
          fi
          {
            echo "decode_rc=$decode_rc"
            echo "gzip_rc=$gzip_rc"
            wc -c "$RUNNER_TEMP/p1t6-4c239.patch.gz.b64"
            wc -c "$RUNNER_TEMP/p1t6-4c239.patch.gz"
            wc -c "$RUNNER_TEMP/p1t6-4c239.patch"
            sha256sum "$RUNNER_TEMP/p1t6-4c239.patch.gz.b64"
            sha256sum "$RUNNER_TEMP/p1t6-4c239.patch.gz"
            sha256sum "$RUNNER_TEMP/p1t6-4c239.patch"
          } | tee "$RUNNER_TEMP/p1t6-4c239-diagnostics.txt"
          exit 0
      - name: Upload three-part Task 6 patch
        uses: actions/upload-artifact@v4
        with:
          name: p1t6-4c239-patch
          path: |
            ${{ runner.temp }}/p1t6-4c239.patch.gz.b64
            ${{ runner.temp }}/p1t6-4c239.patch.gz
            ${{ runner.temp }}/p1t6-4c239.patch
            ${{ runner.temp }}/p1t6-4c239-diagnostics.txt
          if-no-files-found: error
          retention-days: 1
