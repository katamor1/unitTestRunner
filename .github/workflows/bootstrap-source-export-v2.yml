name: bootstrap-source-export-v2

on:
  push:
    branches:
      - codex/bootstrap-source-export-b667901-v2
    paths:
      - .github/workflows/bootstrap-source-export-v2.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/bootstrap-source-export-v2.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/p1t6-patch-publish
          fetch-depth: 1
      - name: Decode Task 6 patch
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode --ignore-garbage \
            .github/bootstrap/p1t6-after-contract.part00.b64 \
            > "$RUNNER_TEMP/p1t6-after-contract.patch.gz"
          gzip -t "$RUNNER_TEMP/p1t6-after-contract.patch.gz"
          gzip -dc "$RUNNER_TEMP/p1t6-after-contract.patch.gz" \
            > "$RUNNER_TEMP/p1t6-after-contract.patch"
          sha256sum "$RUNNER_TEMP/p1t6-after-contract.patch.gz" \
            "$RUNNER_TEMP/p1t6-after-contract.patch"
      - name: Upload Task 6 patch
        uses: actions/upload-artifact@v4
        with:
          name: p1t6-after-contract-patch
          path: |
            ${{ runner.temp }}/p1t6-after-contract.patch.gz
            ${{ runner.temp }}/p1t6-after-contract.patch
          if-no-files-found: error
          retention-days: 1
