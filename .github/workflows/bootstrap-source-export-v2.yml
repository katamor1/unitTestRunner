name: bootstrap-source-export-v2

on:
  push:
    branches:
      - codex/bootstrap-source-export-b667901-v2
    paths:
      - .github/workflows/bootstrap-source-export-v2.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/bootstrap-source-export-v2.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch repository refs and build bundle
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' '+refs/tags/*:refs/tags/*' --prune
          git bundle create "$RUNNER_TEMP/unitTestRunner-all.bundle" --all
          git bundle verify "$RUNNER_TEMP/unitTestRunner-all.bundle"
          git bundle list-heads "$RUNNER_TEMP/unitTestRunner-all.bundle" \
            > "$RUNNER_TEMP/unitTestRunner-all-heads.txt"
          sha256sum "$RUNNER_TEMP/unitTestRunner-all.bundle" \
            > "$RUNNER_TEMP/unitTestRunner-all.bundle.sha256"
      - name: Upload repository bundle
        uses: actions/upload-artifact@v4
        with:
          name: unitTestRunner-all-git-bundle
          path: |
            ${{ runner.temp }}/unitTestRunner-all.bundle
            ${{ runner.temp }}/unitTestRunner-all.bundle.sha256
            ${{ runner.temp }}/unitTestRunner-all-heads.txt
          if-no-files-found: error
          retention-days: 1
