name: bootstrap-source-export-v2

on:
  push:
    branches:
      - codex/bootstrap-source-export-b667901-v2
    paths:
      - .github/workflows/bootstrap-source-export-v2.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/bootstrap-source-export-v2.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/bootstrap-p1t6-4c239-v1
          fetch-depth: 1
      - name: Inventory Task 6 patch chunks
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/p1t6-4c239-chunks"
          for part in \
            .github/bootstrap/p1t6-4c239.patch.gz.b64.part00 \
            .github/bootstrap/p1t6-4c239.patch.gz.b64.part01 \
            .github/bootstrap/p1t6-4c239.patch.gz.b64.part02
          do
            cp "$part" "$RUNNER_TEMP/p1t6-4c239-chunks/$(basename "$part")"
            wc -c "$part" >> "$RUNNER_TEMP/p1t6-4c239-chunks/inventory.txt"
            sha256sum "$part" >> "$RUNNER_TEMP/p1t6-4c239-chunks/inventory.txt"
          done
      - name: Upload raw Task 6 patch chunks
        uses: actions/upload-artifact@v4
        with:
          name: p1t6-4c239-raw-chunks
          path: ${{ runner.temp }}/p1t6-4c239-chunks
          if-no-files-found: error
          retention-days: 1
