name: bootstrap-source-export-v2

on:
  push:
    branches:
      - codex/bootstrap-source-export-b667901-v2
    paths:
      - .github/workflows/bootstrap-source-export-v2.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/bootstrap-source-export-v2.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 9da6b8ecbcd4a95d80ea61347558e4d5721d30a5
          fetch-depth: 0
      - name: Build Task 6 source archive
        shell: bash
        run: |
          set -euo pipefail
          git archive --format=tar.gz --prefix=unitTestRunner-p1t6/ --output=unitTestRunner-p1t6-source.tar.gz 9da6b8ecbcd4a95d80ea61347558e4d5721d30a5
          sha256sum unitTestRunner-p1t6-source.tar.gz > unitTestRunner-p1t6-source.tar.gz.sha256
      - name: Upload Task 6 source artifact
        uses: actions/upload-artifact@v4
        with:
          name: unitTestRunner-p1t6-source
          path: |
            unitTestRunner-p1t6-source.tar.gz
            unitTestRunner-p1t6-source.tar.gz.sha256
          if-no-files-found: error
          retention-days: 1
