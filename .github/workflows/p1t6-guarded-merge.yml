name: Guarded Phase 1 Task 6 completion and merge

on:
  push:
    branches:
      - codex/bootstrap-source-export-b667901-v2
    paths:
      - .github/workflows/p1t6-guarded-merge.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/p1t6-guarded-merge.yml
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: guarded-p1t6-recovery
  cancel-in-progress: true

jobs:
  complete-verify-merge:
    runs-on: windows-latest
    timeout-minutes: 330
    env:
      TARGET_BRANCH: codex/p1t6-review-decisions-readiness
      TARGET_PR: "12"
      BOOTSTRAP_PR: "13"
      EXPECTED_BASE: b66790165a2d4f82943cd199b3b499e1f1725fc3
      EXPECTED_HEAD: 9da6b8ecbcd4a95d80ea61347558e4d5721d30a5
      PATCH_RUN_ID: "29221806111"
      PATCH_ARTIFACT: p1t6-4c239-patch
      PYTHONUTF8: "1"
      OPENBLAS_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
    steps:
      - name: Checkout bootstrap repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download and extract recovered Task 6 patch
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $artifactDir = Join-Path $env:RUNNER_TEMP 'p1t6-artifact'
          $output = Join-Path $env:RUNNER_TEMP 'p1t6-recovered.patch'
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          gh run download $env:PATCH_RUN_ID --repo $env:GITHUB_REPOSITORY --name $env:PATCH_ARTIFACT --dir $artifactDir
          if ($LASTEXITCODE -ne 0) { throw 'failed to download recovered Task 6 patch artifact' }
          @'
          from __future__ import annotations
          import gzip
          import hashlib
          import io
          import pathlib
          import sys
          import zipfile

          root = pathlib.Path(sys.argv[1])
          destination = pathlib.Path(sys.argv[2])
          files = sorted(path for path in root.rglob('*') if path.is_file())
          if not files:
              raise SystemExit('patch artifact is empty')
          seen: set[tuple[str, str]] = set()
          candidates: list[tuple[pathlib.Path, bytes]] = []

          def visit(name: pathlib.Path, data: bytes) -> None:
              digest = hashlib.sha256(data).hexdigest()
              key = (str(name), digest)
              if key in seen:
                  return
              seen.add(key)
              print(f'inspect name={name} bytes={len(data)} sha256={digest}')
              if data.startswith(b'\x1f\x8b'):
                  visit(pathlib.Path(str(name) + '.gunzipped'), gzip.decompress(data))
                  return
              if data.startswith(b'PK\x03\x04'):
                  with zipfile.ZipFile(io.BytesIO(data)) as archive:
                      for member in archive.infolist():
                          if not member.is_dir():
                              visit(pathlib.Path(str(name)) / member.filename, archive.read(member))
                  return
              if b'diff --git ' in data and (b'--- a/' in data or b'new file mode ' in data):
                  candidates.append((name, data))

          for path in files:
              visit(path.relative_to(root), path.read_bytes())
          if len(candidates) != 1:
              raise SystemExit(f'expected exactly one unified patch, found {len(candidates)}: {[str(n) for n, _ in candidates]}')
          name, patch = candidates[0]
          destination.write_bytes(patch)
          print(f'selected={name} patch_bytes={len(patch)} patch_sha256={hashlib.sha256(patch).hexdigest()}')
          '@ | python - $artifactDir $output
          if ($LASTEXITCODE -ne 0) { throw 'patch extraction or validation failed' }

      - name: Apply candidate to exact Task 6 head
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          git fetch origin $env:TARGET_BRANCH main
          git checkout -B $env:TARGET_BRANCH ("origin/{0}" -f $env:TARGET_BRANCH)
          $head = (git rev-parse HEAD).Trim()
          if ($head -ne $env:EXPECTED_HEAD) {
            throw "refusing recovery: expected target head $env:EXPECTED_HEAD but found $head"
          }
          $base = (git merge-base HEAD origin/main).Trim()
          if ($base -ne $env:EXPECTED_BASE) {
            throw "refusing recovery: expected merge base $env:EXPECTED_BASE but found $base"
          }
          $patch = Join-Path $env:RUNNER_TEMP 'p1t6-recovered.patch'
          git apply --check $patch
          if ($LASTEXITCODE -ne 0) { throw 'candidate patch does not apply cleanly to the exact Task 6 head' }
          git apply $patch
          if ($LASTEXITCODE -ne 0) { throw 'candidate patch application failed' }
          $changed = @(git diff --name-only)
          if ($changed.Count -eq 0) { throw 'candidate patch produced no changes' }
          $forbidden = @($changed | Where-Object { $_ -like '.github/*' -or $_ -eq '.github' })
          if ($forbidden.Count -ne 0) { throw ('candidate patch changes workflow/bootstrap files: ' + ($forbidden -join ', ')) }
          $deletedTests = @(git diff --diff-filter=D --name-only -- tests)
          if ($deletedTests.Count -ne 0) { throw ('candidate patch deletes tests: ' + ($deletedTests -join ', ')) }
          git diff --stat
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw 'candidate patch has whitespace errors' }

      - name: Reject obvious test weakening
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $diffPath = Join-Path $env:RUNNER_TEMP 'p1t6-tests.diff'
          git diff --unified=0 -- tests | Out-File -Encoding utf8 $diffPath
          @'
          import pathlib
          import re
          import sys
          text = pathlib.Path(sys.argv[1]).read_text(encoding='utf-8-sig')
          suspicious = []
          patterns = {
              'new skip decorator': re.compile(r'^\+\s*@(?:unittest\.)?skip', re.I),
              'new expected failure': re.compile(r'^\+.*expectedFailure', re.I),
              'tautological assertion': re.compile(r'^\+.*assert(?:True\(True\)|False\(False\))'),
              'coverage exclusion': re.compile(r'^\+.*pragma:\s*no\s*cover', re.I),
          }
          for line_number, line in enumerate(text.splitlines(), 1):
              if line.startswith('+++'):
                  continue
              for label, pattern in patterns.items():
                  if pattern.search(line):
                      suspicious.append((line_number, label, line))
          if suspicious:
              for item in suspicious:
                  print(item)
              raise SystemExit('candidate patch contains obvious test weakening')
          print('test-weakening scan passed')
          '@ | python - $diffPath
          if ($LASTEXITCODE -ne 0) { throw 'test weakening guard failed' }

      - name: Install project dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install "setuptools>=61" wheel
          python -m pip install -e .

      - name: Run Task 6 focused RED-to-GREEN verification set
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $focused = @(
            'tests.test_review_decisions',
            'tests.test_review_decision_staleness',
            'tests.test_dossier_readiness',
            'tests.test_dossier_review_authority',
            'tests.test_review_decision_integration',
            'tests.test_review_decision_cli',
            'tests.test_reanalysis_cli',
            'tests.test_test_spec_consumers',
            'tests.test_vc6_fixture_build_e2e'
          )
          foreach ($module in $focused) {
            Write-Host "=== focused $module ==="
            & python -m unittest $module -v
            if ($LASTEXITCODE -ne 0) { throw "focused test failed: $module" }
          }

      - name: Run authoritative isolated Python gate
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:PYTHONPATH = (Resolve-Path .\src).Path
          $modules = Get-ChildItem -LiteralPath .\tests -Filter 'test_*.py' -File |
            Sort-Object Name |
            ForEach-Object { 'tests.' + $_.BaseName }
          if ($modules.Count -lt 100) { throw "unexpected test module count: $($modules.Count)" }
          $failed = @()
          foreach ($module in $modules) {
            Write-Host "=== isolated $module ==="
            & python -m unittest $module -v
            if ($LASTEXITCODE -ne 0) { $failed += $module }
          }
          Write-Host "isolated-module-count=$($modules.Count)"
          if ($failed.Count -ne 0) { throw ('isolated Python failures: ' + ($failed -join ', ')) }

      - name: Run compile CLI fixture and package gates
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          python -m compileall -q src tests
          if ($LASTEXITCODE -ne 0) { throw 'compileall failed' }
          python -m unit_test_runner --help | Out-Null
          if ($LASTEXITCODE -ne 0) { throw 'CLI help failed' }
          python -m unittest tests.test_fixture_cli_smoke tests.test_vc6_fixture_build_e2e -v
          if ($LASTEXITCODE -ne 0) { throw 'fixture smoke failed' }

          $dist = Join-Path $env:RUNNER_TEMP 'p1t6-wheel'
          $venv = Join-Path $env:RUNNER_TEMP 'p1t6-fresh-venv'
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          python -m pip wheel --no-deps --wheel-dir $dist .
          if ($LASTEXITCODE -ne 0) { throw 'wheel build failed' }
          python -m venv $venv
          if ($LASTEXITCODE -ne 0) { throw 'fresh venv creation failed' }
          $freshPython = Join-Path $venv 'Scripts\python.exe'
          $wheel = Get-ChildItem -LiteralPath $dist -Filter 'unit_test_runner-*.whl' | Select-Object -First 1
          if ($null -eq $wheel) { throw 'wheel was not produced' }
          & $freshPython -m pip install $wheel.FullName
          if ($LASTEXITCODE -ne 0) { throw 'fresh wheel install failed' }
          & $freshPython -m unit_test_runner --help | Out-Null
          if ($LASTEXITCODE -ne 0) { throw 'fresh-installed CLI failed' }
          @'
          from importlib import resources
          from unit_test_runner.contracts import ArtifactKind
          from unit_test_runner.contracts.registry import get_contract
          root = resources.files('unit_test_runner.schemas')
          missing = []
          for kind in ArtifactKind:
              contract = get_contract(kind)
              if not root.joinpath(contract.schema_resource).is_file():
                  missing.append((kind.value, contract.schema_resource))
          assert root.joinpath('common.schema.json').is_file()
          assert not missing, missing
          print(f'loaded-current-contracts={len(list(ArtifactKind))}')
          '@ | & $freshPython -
          if ($LASTEXITCODE -ne 0) { throw 'fresh-installed contract registry check failed' }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw 'git diff check failed' }

      - name: Run VS Code gates if extension changed
        shell: pwsh
        run: |
          $changed = @(git diff --name-only)
          if ($changed | Where-Object { $_ -like 'vscode/extension/*' }) {
            Push-Location vscode\extension
            npm ci
            npm.cmd test
            if ($LASTEXITCODE -ne 0) { throw 'VS Code tests failed' }
            npm.cmd run compile
            if ($LASTEXITCODE -ne 0) { throw 'VS Code compile failed' }
            Pop-Location
          } else {
            Write-Host 'VS Code extension unchanged; official repository CI will verify it independently.'
          }

      - name: Commit verified Task 6 completion
        id: publish
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A src tests docs README.md pyproject.toml
          if (git diff --cached --quiet) { throw 'no verified product changes to commit' }
          git diff --cached --check
          if ($LASTEXITCODE -ne 0) { throw 'staged diff check failed' }
          git commit -m 'feat: complete phase 1 task 6 review decisions'
          $verifiedSha = (git rev-parse HEAD).Trim()
          git push origin ("HEAD:refs/heads/{0}" -f $env:TARGET_BRANCH)
          if ($LASTEXITCODE -ne 0) { throw 'failed to publish verified Task 6 commit' }
          "verified_sha=$verifiedSha" >> $env:GITHUB_OUTPUT

      - name: Dispatch and wait for official repository CI
        id: official_ci
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          VERIFIED_SHA: ${{ steps.publish.outputs.verified_sha }}
        run: |
          $ErrorActionPreference = 'Stop'
          $started = [DateTimeOffset]::UtcNow
          gh workflow run ci.yml --repo $env:GITHUB_REPOSITORY --ref $env:TARGET_BRANCH
          if ($LASTEXITCODE -ne 0) { throw 'failed to dispatch official CI' }
          $deadline = [DateTimeOffset]::UtcNow.AddMinutes(90)
          $run = $null
          while ([DateTimeOffset]::UtcNow -lt $deadline) {
            $runs = gh run list --repo $env:GITHUB_REPOSITORY --workflow ci.yml --branch $env:TARGET_BRANCH --event workflow_dispatch --limit 30 --json databaseId,headSha,status,conclusion,createdAt,url | ConvertFrom-Json
            $run = $runs | Where-Object { $_.headSha -eq $env:VERIFIED_SHA -and [DateTimeOffset]$_.createdAt -ge $started.AddMinutes(-1) } | Sort-Object createdAt -Descending | Select-Object -First 1
            if ($null -eq $run) {
              Start-Sleep -Seconds 10
              continue
            }
            Write-Host "official-ci run=$($run.databaseId) status=$($run.status) conclusion=$($run.conclusion) url=$($run.url)"
            if ($run.status -eq 'completed') { break }
            Start-Sleep -Seconds 20
          }
          if ($null -eq $run -or $run.status -ne 'completed') { throw 'official CI did not complete before timeout' }
          if ($run.conclusion -ne 'success') {
            gh run view $run.databaseId --repo $env:GITHUB_REPOSITORY --log-failed
            throw "official CI failed with conclusion $($run.conclusion)"
          }
          "run_id=$($run.databaseId)" >> $env:GITHUB_OUTPUT
          "run_url=$($run.url)" >> $env:GITHUB_OUTPUT

      - name: Perform final base guard and automated formal review
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          VERIFIED_SHA: ${{ steps.publish.outputs.verified_sha }}
          CI_URL: ${{ steps.official_ci.outputs.run_url }}
        run: |
          $ErrorActionPreference = 'Stop'
          $pr = gh api ("repos/{0}/pulls/{1}" -f $env:GITHUB_REPOSITORY, $env:TARGET_PR) | ConvertFrom-Json
          if ($pr.base.sha -ne $env:EXPECTED_BASE) { throw "main moved from tested base: $($pr.base.sha)" }
          if ($pr.head.sha -ne $env:VERIFIED_SHA) { throw "PR head moved from verified commit: $($pr.head.sha)" }
          if ($pr.state -ne 'open') { throw "PR is not open: $($pr.state)" }
          $reviewBody = @"
          Automated formal verification for Phase 1 Task 6 completed against exact head `$env:VERIFIED_SHA` and exact base `$env:EXPECTED_BASE`.

          - Task 6 focused modules: PASS
          - Every `tests/test_*.py` module, isolated and serial: PASS
          - compileall and CLI smoke: PASS
          - VC6 fixture smoke: PASS
          - wheel/fresh-install/schema registry: PASS
          - obvious test-weakening scan and diff checks: PASS
          - official Windows repository CI: $env:CI_URL

          The merge is guarded by exact base/head SHAs; no stale or untested tree is accepted.
          "@
          gh pr review $env:TARGET_PR --repo $env:GITHUB_REPOSITORY --approve --body $reviewBody
          if ($LASTEXITCODE -ne 0) { throw 'formal review submission failed' }
          gh pr ready $env:TARGET_PR --repo $env:GITHUB_REPOSITORY
          if ($LASTEXITCODE -ne 0) { throw 'failed to mark PR ready for review' }

      - name: Merge exact verified PR head into main
        id: merge
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          VERIFIED_SHA: ${{ steps.publish.outputs.verified_sha }}
        run: |
          $ErrorActionPreference = 'Stop'
          $result = gh api --method PUT ("repos/{0}/pulls/{1}/merge" -f $env:GITHUB_REPOSITORY, $env:TARGET_PR) -f merge_method=merge -f sha=$env:VERIFIED_SHA | ConvertFrom-Json
          if (-not $result.merged) { throw "GitHub refused merge: $($result.message)" }
          Write-Host "merged-sha=$($result.sha)"
          "merge_sha=$($result.sha)" >> $env:GITHUB_OUTPUT

      - name: Verify merged main with official CI
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          MERGE_SHA: ${{ steps.merge.outputs.merge_sha }}
        run: |
          $ErrorActionPreference = 'Stop'
          $started = [DateTimeOffset]::UtcNow
          gh workflow run ci.yml --repo $env:GITHUB_REPOSITORY --ref main
          if ($LASTEXITCODE -ne 0) { throw 'failed to dispatch post-merge main CI' }
          $deadline = [DateTimeOffset]::UtcNow.AddMinutes(90)
          $run = $null
          while ([DateTimeOffset]::UtcNow -lt $deadline) {
            $runs = gh run list --repo $env:GITHUB_REPOSITORY --workflow ci.yml --branch main --event workflow_dispatch --limit 30 --json databaseId,headSha,status,conclusion,createdAt,url | ConvertFrom-Json
            $run = $runs | Where-Object { $_.headSha -eq $env:MERGE_SHA -and [DateTimeOffset]$_.createdAt -ge $started.AddMinutes(-1) } | Sort-Object createdAt -Descending | Select-Object -First 1
            if ($null -eq $run) { Start-Sleep -Seconds 10; continue }
            Write-Host "post-merge-ci run=$($run.databaseId) status=$($run.status) conclusion=$($run.conclusion) url=$($run.url)"
            if ($run.status -eq 'completed') { break }
            Start-Sleep -Seconds 20
          }
          if ($null -eq $run -or $run.status -ne 'completed') { throw 'post-merge main CI did not complete before timeout' }
          if ($run.conclusion -ne 'success') {
            gh run view $run.databaseId --repo $env:GITHUB_REPOSITORY --log-failed
            throw "post-merge main CI failed with conclusion $($run.conclusion)"
          }

      - name: Close temporary recovery PR
        if: success()
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          MERGE_SHA: ${{ steps.merge.outputs.merge_sha }}
        run: |
          gh pr close $env:BOOTSTRAP_PR --repo $env:GITHUB_REPOSITORY --comment "Task 6 was verified and merged to main at $env:MERGE_SHA. Closing this temporary recovery PR without merge."

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: guarded-p1t6-completion-diagnostics
          path: |
            ${{ runner.temp }}/p1t6-artifact
            ${{ runner.temp }}/p1t6-recovered.patch
            ${{ runner.temp }}/p1t6-tests.diff
          if-no-files-found: warn
          retention-days: 3
