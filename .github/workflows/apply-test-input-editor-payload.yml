name: Apply Test Input Editor Payload

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: apply-test-input-editor-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Detect staged payload
        id: staged
        shell: bash
        run: |
          if [[ -f .sdd/ready && -f .sdd/verify.sh && -f .sdd/commit-message.txt && -f .sdd/payload.sha256 ]] && compgen -G '.sdd/payload.tar.gz.b64.*' >/dev/null; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Python
        if: steps.staged.outputs.present == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Node
        if: steps.staged.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode/extension/package-lock.json
      - name: Install dependencies
        if: steps.staged.outputs.present == 'true'
        shell: bash
        run: |
          python -m pip install "setuptools>=61" wheel
          python -m pip install -e ".[test]"
          pushd vscode/extension
          npm ci
          popd
      - name: Apply and verify payload
        if: steps.staged.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .sdd/diagnostics
          cat .sdd/payload.tar.gz.b64.* > .sdd/diagnostics/payload.b64
          python - <<'PY'
          import base64
          import hashlib
          from pathlib import Path

          encoded = Path('.sdd/diagnostics/payload.b64').read_bytes()
          payload = base64.b64decode(encoded, validate=True)
          expected = Path('.sdd/payload.sha256').read_text(encoding='utf-8').strip()
          actual = hashlib.sha256(payload).hexdigest()
          if actual != expected:
              raise SystemExit(f'payload SHA-256 mismatch: expected {expected}, got {actual}')
          Path('/tmp/test-input-editor-payload.tar.gz').write_bytes(payload)
          print(f'payload_bytes={len(payload)} sha256={actual}')
          PY
          tar -xzf /tmp/test-input-editor-payload.tar.gz -C .
          bash .sdd/verify.sh 2>&1 | tee .sdd/diagnostics/verify.log
      - name: Upload diagnostics
        if: failure() && steps.staged.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-input-editor-payload-diagnostics-${{ github.sha }}
          path: .sdd/diagnostics
          retention-days: 2
      - name: Commit verified implementation
        if: steps.staged.outputs.present == 'true' && success()
        shell: bash
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          message="$(cat .sdd/commit-message.txt)"
          rm -rf .sdd
          rm -f .github/workflows/apply-test-input-editor-payload.yml
          git config user.name "OpenAI"
          git config user.email "noreply@openai.com"
          git add -A
          git commit -m "$message"
          git push origin "HEAD:$BRANCH"
