name: Finalize Test Execution Blocker Report

on:
  push:
    branches:
      - stage/test-execution-blocker-report-merge
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write

concurrency:
  group: finalize-test-execution-blocker-report
  cancel-in-progress: false

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: stage/test-execution-blocker-report-merge
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: vscode/extension/package-lock.json

      - name: Prepare verified snapshot
        shell: pwsh
        run: |
          git fetch origin main feat/test-execution-blocker-report-release
          git reset --hard origin/main
          git clean -fdx
          git checkout origin/feat/test-execution-blocker-report-release -- .
          Remove-Item -LiteralPath .sdd -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath .github\workflows\apply-test-execution-blocker-report.yml -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath .github\workflows\finalize-test-execution-blocker-report.yml -Force -ErrorAction SilentlyContinue
          $diagnostic = Join-Path $env:RUNNER_TEMP 'snapshot-diagnostics.txt'
          "HEAD=$(git rev-parse HEAD)" | Out-File $diagnostic -Encoding utf8
          "release=$(git rev-parse origin/feat/test-execution-blocker-report-release)" | Out-File $diagnostic -Append -Encoding utf8
          "blocker_analyzer=$(Test-Path -LiteralPath .\src\unit_test_runner\execution\blocker_analyzer.py -PathType Leaf)" | Out-File $diagnostic -Append -Encoding utf8
          "artifact_kind=$([bool](Select-String -LiteralPath .\src\unit_test_runner\contracts\kinds.py -SimpleMatch 'TEST_EXECUTION_BLOCKER_REPORT' -ErrorAction SilentlyContinue))" | Out-File $diagnostic -Append -Encoding utf8
          'status:' | Out-File $diagnostic -Append -Encoding utf8
          git status --short | Out-File $diagnostic -Append -Encoding utf8
          'diff-names:' | Out-File $diagnostic -Append -Encoding utf8
          git diff --name-only | Out-File $diagnostic -Append -Encoding utf8

      - name: Upload snapshot diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blocker-snapshot-diagnostics
          path: ${{ runner.temp }}/snapshot-diagnostics.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Create clean one-parent feature commit
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath .\src\unit_test_runner\execution\blocker_analyzer.py -PathType Leaf)) {
            throw 'Verified snapshot does not contain blocker_analyzer.py'
          }
          if (-not (Select-String -LiteralPath .\src\unit_test_runner\contracts\kinds.py -SimpleMatch 'TEST_EXECUTION_BLOCKER_REPORT')) {
            throw 'Verified snapshot does not register the blocker artifact kind'
          }
          git diff --check
          git config user.name OpenAI
          git config user.email noreply@openai.com
          git add -A
          if ((git diff --cached --name-only).Count -eq 0) {
            throw 'Verified snapshot produced no feature diff against main'
          }
          git commit -m 'feat: add test execution blocker reports'

      - name: Build through the standard distribution script
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build_distribution.ps1
          if (-not (Test-Path -LiteralPath .\dist\unit-test-runner.exe -PathType Leaf)) {
            throw 'Standard build did not produce dist\unit-test-runner.exe'
          }
          if (-not (Test-Path -LiteralPath .\dist\unit-test-runner-vscode-0.1.0.vsix -PathType Leaf)) {
            throw 'Standard build did not produce dist\unit-test-runner-vscode-0.1.0.vsix'
          }
          if ((git status --porcelain --untracked-files=no).Count -ne 0) {
            git status --short
            throw 'Standard build modified tracked source files'
          }

      - name: Upload verified standard distribution
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-runner-blocker-report-standard-distribution
          path: |
            dist/unit-test-runner.exe
            dist/unit-test-runner-vscode-0.1.0.vsix
          if-no-files-found: error
          retention-days: 14

      - name: Publish clean feature branch
        if: success()
        shell: pwsh
        run: |
          git push origin HEAD:refs/heads/feat/test-execution-blocker-report-formal --force
