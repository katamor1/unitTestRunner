name: Finalize Test Execution Blocker Report

on:
  push:
    branches:
      - stage/test-execution-blocker-report-merge
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write
  issues: read
  pull-requests: read

concurrency:
  group: finalize-test-execution-blocker-report
  cancel-in-progress: false

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: stage/test-execution-blocker-report-merge
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: vscode/extension/package-lock.json

      - name: Reconstruct verified implementation patch
        shell: pwsh
        run: |
          @'
          import base64
          import gzip
          import hashlib
          import json
          import os
          import re
          import urllib.request
          from pathlib import Path

          repository = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          request = urllib.request.Request(
              f"https://api.github.com/repos/{repository}/issues/45/comments?per_page=100",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request) as response:
              comments = json.load(response)

          pattern = re.compile(
              r"<!-- UTR_BLOCKER_PATCH_PART:(\d)/6 -->\s*"
              r"([A-Za-z0-9+/=]+)\s*"
              r"<!-- /UTR_BLOCKER_PATCH_PART -->"
          )
          parts = {}
          for comment in comments:
              for match in pattern.finditer(str(comment.get("body") or "")):
                  index = int(match.group(1))
                  if index in parts:
                      raise SystemExit(f"duplicate patch part: {index}")
                  parts[index] = match.group(2)
          if set(parts) != set(range(1, 7)):
              raise SystemExit(f"invalid patch part set: {sorted(parts)}")

          encoded = "".join(parts[index] for index in range(1, 7))
          if len(encoded) != 60472:
              raise SystemExit(f"unexpected base64 length: {len(encoded)}")
          if hashlib.sha256(encoded.encode("ascii")).hexdigest() != "fb0ed0d888ed0fb56162faeccb2c56b166bacc1de14fe8b93f3335ba30b18956":
              raise SystemExit("base64 patch SHA-256 mismatch")
          compressed = base64.b64decode(encoded, validate=True)
          if len(compressed) != 45353:
              raise SystemExit(f"unexpected compressed size: {len(compressed)}")
          if hashlib.sha256(compressed).hexdigest() != "f9396853845f7bb00713c91257d0659e64174ed35ed87ff86b4c390cc74555db":
              raise SystemExit("compressed patch SHA-256 mismatch")
          patch = gzip.decompress(compressed)
          if len(patch) != 217566:
              raise SystemExit(f"unexpected patch size: {len(patch)}")
          if hashlib.sha256(patch).hexdigest() != "7d37623e9551601aeaf26abba4e045f4a333dda40de123361a33026b5b7c8092":
              raise SystemExit("raw patch SHA-256 mismatch")

          patch_path = Path(os.environ["RUNNER_TEMP"]) / "test-execution-blocker-report.patch"
          patch_path.write_bytes(patch)
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"FEATURE_PATCH={patch_path}\n")
          print(f"verified patch bytes={len(patch)}")
          '@ | python -

      - name: Create one clean feature commit
        shell: pwsh
        run: |
          git fetch origin main
          git reset --hard origin/main
          git clean -fdx
          git apply --check --binary $env:FEATURE_PATCH
          git apply --binary $env:FEATURE_PATCH
          @'
          from pathlib import Path

          path = Path("tests/test_execution_run_history.py")
          source = path.read_text(encoding="utf-8")
          old = '''            self.assertEqual(
              workspace / "runs" / "run-blocked" / "test_execution_blockers.json",
              paths.blocker_report_json,
            )
            self.assertEqual(
              workspace / "runs" / "run-blocked" / "test_execution_blockers.md",
              paths.blocker_report_markdown,
            )
          '''
          new = '''            resolved_workspace = workspace.resolve()
            self.assertEqual(
              resolved_workspace / "runs" / "run-blocked" / "test_execution_blockers.json",
              paths.blocker_report_json,
            )
            self.assertEqual(
              resolved_workspace / "runs" / "run-blocked" / "test_execution_blockers.md",
              paths.blocker_report_markdown,
            )
          '''
          if old not in source:
              raise SystemExit("Windows run-path test block was not found")
          path.write_text(source.replace(old, new), encoding="utf-8")
          '@ | python -
          Remove-Item -LiteralPath .sdd -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath .github\workflows\apply-test-execution-blocker-report.yml -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath .github\workflows\finalize-test-execution-blocker-report.yml -Force -ErrorAction SilentlyContinue
          if (-not (Test-Path -LiteralPath .\src\unit_test_runner\execution\blocker_analyzer.py -PathType Leaf)) {
            throw 'Reviewed patch does not contain blocker_analyzer.py'
          }
          if (-not (Select-String -LiteralPath .\src\unit_test_runner\contracts\kinds.py -SimpleMatch 'TEST_EXECUTION_BLOCKER_REPORT')) {
            throw 'Reviewed patch does not register the blocker artifact kind'
          }
          if (-not (Select-String -LiteralPath .\vscode\extension\src\extension.ts -SimpleMatch 'testExecutionBlockers')) {
            throw 'Reviewed patch does not contain VS Code blocker integration'
          }
          git diff --check
          git config user.name OpenAI
          git config user.email noreply@openai.com
          git add -A
          if ((git diff --cached --name-only).Count -eq 0) {
            throw 'Reviewed patch produced no feature diff against main'
          }
          git commit -m 'feat: add test execution blocker reports'
          $parents = @((git rev-list --parents -n 1 HEAD).Split(' ', [System.StringSplitOptions]::RemoveEmptyEntries))
          if ($parents.Count -ne 2) {
            throw "Formal feature commit must have exactly one parent; got $($parents.Count - 1)"
          }
          if ($parents[1] -ne (git rev-parse origin/main)) {
            throw 'Formal feature commit parent does not match origin/main'
          }

      - name: Build through the standard distribution script
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP 'standard-distribution-build.log'
          & powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build_distribution.ps1 *>&1 |
            Tee-Object -FilePath $log
          $buildExit = $LASTEXITCODE
          if ($buildExit -ne 0) {
            throw "Standard distribution build failed with exit code $buildExit"
          }
          if (-not (Test-Path -LiteralPath .\dist\unit-test-runner.exe -PathType Leaf)) {
            throw 'Standard build did not produce dist\unit-test-runner.exe'
          }
          if (-not (Test-Path -LiteralPath .\dist\unit-test-runner-vscode-0.1.0.vsix -PathType Leaf)) {
            throw 'Standard build did not produce dist\unit-test-runner-vscode-0.1.0.vsix'
          }
          if ((git status --porcelain --untracked-files=no).Count -ne 0) {
            git status --short
            throw 'Standard build modified tracked source files'
          }

      - name: Upload standard build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-runner-standard-build-log
          path: ${{ runner.temp }}/standard-distribution-build.log
          if-no-files-found: warn
          retention-days: 7

      - name: Upload verified standard distribution
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-runner-blocker-report-standard-distribution
          path: |
            dist/unit-test-runner.exe
            dist/unit-test-runner-vscode-0.1.0.vsix
          if-no-files-found: error
          retention-days: 14

      - name: Publish clean feature branch
        shell: pwsh
        run: |
          git push origin HEAD:refs/heads/feat/test-execution-blocker-report-formal --force
