name: Apply and Build Test Execution Blocker Report

on:
  push:
    branches:
      - feat/test-execution-blocker-report

permissions:
  contents: write

concurrency:
  group: apply-test-execution-blocker-report
  cancel-in-progress: false

jobs:
  apply-build:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/test-execution-blocker-report
          fetch-depth: 0

      - name: Detect complete staged payload
        id: staged
        shell: pwsh
        run: |
          $parts = @(Get-ChildItem -LiteralPath .sdd -Filter 'payload.part.*' -File -ErrorAction SilentlyContinue | Sort-Object Name)
          $present = (Test-Path -LiteralPath .sdd\ready -PathType Leaf) -and
                     (Test-Path -LiteralPath .sdd\payload.sha256 -PathType Leaf) -and
                     (Test-Path -LiteralPath .sdd\commit-message.txt -PathType Leaf) -and
                     ($parts.Count -gt 0)
          "present=$($present.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Set up Python
        if: steps.staged.outputs.present == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        if: steps.staged.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: vscode/extension/package-lock.json

      - name: Reconstruct and apply reviewed payload
        if: steps.staged.outputs.present == 'true'
        shell: pwsh
        run: |
          @'
          import base64
          import hashlib
          import tarfile
          from pathlib import Path

          root = Path.cwd().resolve()
          parts = sorted(Path('.sdd').glob('payload.part.*'))
          encoded = b''.join(part.read_bytes() for part in parts)
          payload = base64.b64decode(encoded, validate=True)
          expected = Path('.sdd/payload.sha256').read_text(encoding='utf-8').strip()
          actual = hashlib.sha256(payload).hexdigest()
          if actual != expected:
              raise SystemExit(f'payload SHA-256 mismatch: expected {expected}, got {actual}')
          archive_path = Path('.sdd/payload.tar.gz')
          archive_path.write_bytes(payload)
          with tarfile.open(archive_path, 'r:gz') as archive:
              for member in archive.getmembers():
                  target = (root / member.name).resolve()
                  try:
                      target.relative_to(root)
                  except ValueError as exc:
                      raise SystemExit(f'payload member escapes repository: {member.name}') from exc
              archive.extractall(root)
          print(f'payload_bytes={len(payload)} sha256={actual} parts={len(parts)}')
          '@ | python -
          git diff --check

      - name: Build through the standard distribution script
        if: steps.staged.outputs.present == 'true'
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build_distribution.ps1
          if (-not (Test-Path -LiteralPath .\dist\unit-test-runner.exe -PathType Leaf)) {
            throw 'Standard build did not produce dist\unit-test-runner.exe'
          }
          if (-not (Test-Path -LiteralPath .\dist\unit-test-runner-vscode-0.1.0.vsix -PathType Leaf)) {
            throw 'Standard build did not produce dist\unit-test-runner-vscode-0.1.0.vsix'
          }

      - name: Upload standard distribution outputs
        if: steps.staged.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-runner-standard-distribution
          path: |
            dist/unit-test-runner.exe
            dist/unit-test-runner-vscode-0.1.0.vsix
          if-no-files-found: error
          retention-days: 7

      - name: Commit verified implementation
        if: steps.staged.outputs.present == 'true' && success()
        shell: pwsh
        run: |
          $message = (Get-Content -LiteralPath .sdd\commit-message.txt -Raw -Encoding UTF8).Trim()
          Remove-Item -LiteralPath .sdd -Recurse -Force
          Remove-Item -LiteralPath .github\workflows\apply-test-execution-blocker-report.yml -Force
          git config user.name OpenAI
          git config user.email noreply@openai.com
          git add -A
          git commit -m $message
          git push origin HEAD:feat/test-execution-blocker-report
