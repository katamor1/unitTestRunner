name: Publish Phase 1 Task 6 checkpoint

on:
  push:
    branches:
      - codex/p1t6-upload-efbff78
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout upload branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decode bundle chunks
        shell: bash
        run: |
          set -euo pipefail
          : > "$RUNNER_TEMP/p1t6.bundle"
          for part in \
            docs/checkpoints/p1t6-bundle/part00.b64 \
            docs/checkpoints/p1t6-bundle/part01.b64
          do
            base64 --decode --ignore-garbage "$part" >> "$RUNNER_TEMP/p1t6.bundle"
          done
          wc -c "$RUNNER_TEMP/p1t6.bundle"
          sha256sum "$RUNNER_TEMP/p1t6.bundle"

      - name: Verify Git bundle
        shell: bash
        run: |
          set -euo pipefail
          git bundle verify "$RUNNER_TEMP/p1t6.bundle"
          git bundle list-heads "$RUNNER_TEMP/p1t6.bundle"

      - name: Import and validate bundle head
        id: import
        shell: bash
        run: |
          set -euo pipefail
          bundle_ref="$(git bundle list-heads "$RUNNER_TEMP/p1t6.bundle" | awk 'NR==1 {print $2}')"
          test -n "$bundle_ref"
          git fetch "$RUNNER_TEMP/p1t6.bundle" "$bundle_ref"
          bundle_head="$(git rev-parse FETCH_HEAD)"
          echo "bundle_head=$bundle_head"
          echo "bundle_ref=$bundle_ref"
          git merge-base --is-ancestor \
            b66790165a2d4f82943cd199b3b499e1f1725fc3 "$bundle_head"
          echo "head=$bundle_head" >> "$GITHUB_OUTPUT"

      - name: Publish task branch
        shell: bash
        run: |
          set -euo pipefail
          git push origin \
            "${{ steps.import.outputs.head }}:refs/heads/codex/p1t6-review-decisions-readiness"
