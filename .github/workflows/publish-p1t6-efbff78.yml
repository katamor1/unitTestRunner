name: Publish Phase 1 Task 6 checkpoint

on:
  push:
    branches:
      - codex/p1t6-upload-efbff78
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout upload branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decode bundle chunks
        shell: bash
        run: |
          set -euo pipefail
          : > "$RUNNER_TEMP/p1t6.bundle"
          for part in \
            docs/checkpoints/p1t6-bundle/part00.b64 \
            docs/checkpoints/p1t6-bundle/part01.b64
          do
            base64 --decode --ignore-garbage "$part" >> "$RUNNER_TEMP/p1t6.bundle"
          done

      - name: Verify Git bundle
        shell: bash
        run: |
          set -euo pipefail
          git bundle verify "$RUNNER_TEMP/p1t6.bundle"
          git bundle list-heads "$RUNNER_TEMP/p1t6.bundle"

      - name: Fetch advertised task ref
        shell: bash
        run: |
          set -euo pipefail
          git fetch "$RUNNER_TEMP/p1t6.bundle" \
            "+refs/heads/codex/p1t6-review-decisions-readiness:refs/heads/p1t6-imported"

      - name: Verify imported commit
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse refs/heads/p1t6-imported)" = \
            "efbff7825b94afda01d86d15b8f0ec6be520225b"
          git cat-file -e \
            efbff7825b94afda01d86d15b8f0ec6be520225b^{commit}

      - name: Validate bundle ancestry
        shell: bash
        run: |
          set -euo pipefail
          git merge-base --is-ancestor \
            b66790165a2d4f82943cd199b3b499e1f1725fc3 \
            efbff7825b94afda01d86d15b8f0ec6be520225b

      - name: Publish task branch
        shell: bash
        run: |
          set -euo pipefail
          git push origin \
            refs/heads/p1t6-imported:refs/heads/codex/p1t6-review-decisions-readiness
