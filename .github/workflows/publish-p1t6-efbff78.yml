name: Publish Phase 1 Task 6 checkpoint

on:
  push:
    branches:
      - codex/p1t6-upload-efbff78
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout upload branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decode bundle chunks
        shell: bash
        run: |
          set -euo pipefail
          : > "$RUNNER_TEMP/p1t6.bundle"
          for part in \
            docs/checkpoints/p1t6-bundle/part00.b64 \
            docs/checkpoints/p1t6-bundle/part01.b64
          do
            base64 --decode --ignore-garbage "$part" >> "$RUNNER_TEMP/p1t6.bundle"
          done
          wc -c "$RUNNER_TEMP/p1t6.bundle"
          sha256sum "$RUNNER_TEMP/p1t6.bundle"

      - name: Inspect Git bundle
        shell: bash
        run: |
          set -euo pipefail
          git bundle verify "$RUNNER_TEMP/p1t6.bundle"
          git bundle list-heads "$RUNNER_TEMP/p1t6.bundle" \
            | tee "$RUNNER_TEMP/p1t6-bundle-heads.txt"

      - name: Upload bundle-head diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: p1t6-bundle-heads
          path: ${{ runner.temp }}/p1t6-bundle-heads.txt
          if-no-files-found: error
          retention-days: 1

      - name: Import bundle ref
        id: import
        shell: bash
        run: |
          set -euo pipefail
          bundle_ref="$(awk 'NR==1 {print $2}' "$RUNNER_TEMP/p1t6-bundle-heads.txt")"
          test -n "$bundle_ref"
          git fetch "$RUNNER_TEMP/p1t6.bundle" "$bundle_ref"
          bundle_head="$(git rev-parse FETCH_HEAD)"
          echo "head=$bundle_head" >> "$GITHUB_OUTPUT"

      - name: Validate bundle ancestry
        shell: bash
        run: |
          set -euo pipefail
          git merge-base --is-ancestor \
            b66790165a2d4f82943cd199b3b499e1f1725fc3 \
            "${{ steps.import.outputs.head }}"

      - name: Publish task branch
        shell: bash
        run: |
          set -euo pipefail
          git push origin \
            "${{ steps.import.outputs.head }}:refs/heads/codex/p1t6-review-decisions-readiness"
