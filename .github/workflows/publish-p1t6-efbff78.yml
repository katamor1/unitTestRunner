name: Export Phase 1 Task 6 checkpoint

on:
  push:
    branches:
      - codex/p1t6-upload-efbff78
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout upload branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decode bundle chunks
        shell: bash
        run: |
          set -euo pipefail
          : > "$RUNNER_TEMP/p1t6.bundle"
          for part in \
            docs/checkpoints/p1t6-bundle/part00.b64 \
            docs/checkpoints/p1t6-bundle/part01.b64
          do
            base64 --decode --ignore-garbage "$part" >> "$RUNNER_TEMP/p1t6.bundle"
          done

      - name: Verify and import checkpoint
        shell: bash
        run: |
          set -euo pipefail
          git bundle verify "$RUNNER_TEMP/p1t6.bundle"
          git fetch "$RUNNER_TEMP/p1t6.bundle" \
            "+refs/heads/codex/p1t6-review-decisions-readiness:refs/heads/p1t6-imported"
          test "$(git rev-parse refs/heads/p1t6-imported)" = \
            "efbff7825b94afda01d86d15b8f0ec6be520225b"
          git merge-base --is-ancestor \
            b66790165a2d4f82943cd199b3b499e1f1725fc3 \
            efbff7825b94afda01d86d15b8f0ec6be520225b

      - name: Build checkpoint source archive
        shell: bash
        run: |
          set -euo pipefail
          git archive --format=tar.gz \
            --prefix=unitTestRunner-p1t6-efbff78/ \
            --output=unitTestRunner-p1t6-efbff78-source.tar.gz \
            efbff7825b94afda01d86d15b8f0ec6be520225b
          sha256sum unitTestRunner-p1t6-efbff78-source.tar.gz \
            > unitTestRunner-p1t6-efbff78-source.tar.gz.sha256

      - name: Upload checkpoint source
        uses: actions/upload-artifact@v4
        with:
          name: unitTestRunner-p1t6-efbff78-source
          path: |
            unitTestRunner-p1t6-efbff78-source.tar.gz
            unitTestRunner-p1t6-efbff78-source.tar.gz.sha256
          if-no-files-found: error
          retention-days: 1
