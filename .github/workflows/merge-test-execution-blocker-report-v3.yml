name: Merge Test Execution Blocker Report v3

on:
  push:
    branches:
      - stage/test-execution-blocker-report-merge

permissions:
  contents: write
  issues: read
  pull-requests: write

concurrency:
  group: merge-test-execution-blocker-report-v3
  cancel-in-progress: false

jobs:
  merge:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stage/test-execution-blocker-report-merge
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: vscode/extension/package-lock.json

      - name: Prepare current main or verified feature commit
        shell: pwsh
        run: |
          git fetch origin main
          $mainSha = (git rev-parse origin/main).Trim()
          "BASE_MAIN_SHA=$mainSha" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          git reset --hard origin/main
          git clean -fdx
          $alreadyMerged = (Test-Path .\src\unit_test_runner\execution\blocker_analyzer.py -PathType Leaf) -and [bool](Select-String .\src\unit_test_runner\contracts\kinds.py -SimpleMatch 'TEST_EXECUTION_BLOCKER_REPORT' -ErrorAction SilentlyContinue) -and [bool](Select-String .\vscode\extension\src\extension.ts -SimpleMatch 'testExecutionBlockers' -ErrorAction SilentlyContinue)
          if ($alreadyMerged) {
            "MERGE_MODE=verify-existing" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
            "FEATURE_SHA=$mainSha" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
            Write-Host "main already contains the blocker-report feature: $mainSha"
            exit 0
          }

          @'
          import base64, gzip, hashlib, json, os, re, urllib.request
          from pathlib import Path
          repository = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          request = urllib.request.Request(
              f"https://api.github.com/repos/{repository}/issues/45/comments?per_page=100",
              headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json", "X-GitHub-Api-Version": "2022-11-28"},
          )
          with urllib.request.urlopen(request) as response:
              comments = json.load(response)
          pattern = re.compile(r"<!-- UTR_BLOCKER_PATCH_PART:(\d)/6 -->\s*([A-Za-z0-9+/=]+)\s*<!-- /UTR_BLOCKER_PATCH_PART -->")
          parts = {}
          for comment in comments:
              for match in pattern.finditer(str(comment.get("body") or "")):
                  idx = int(match.group(1))
                  if idx in parts:
                      raise SystemExit(f"duplicate part {idx}")
                  parts[idx] = match.group(2)
          if set(parts) != set(range(1, 7)):
              raise SystemExit(f"incomplete patch: {sorted(parts)}")
          encoded = ''.join(parts[i] for i in range(1, 7))
          compressed = base64.b64decode(encoded, validate=True)
          if len(encoded) != 60472 or hashlib.sha256(compressed).hexdigest() != '5a1c0e0bff864efa9bfe27258d7c669d0ac0a060337dd49922eb2a2d96b91cba':
              raise SystemExit('compressed patch identity mismatch')
          patch = gzip.decompress(compressed)
          if len(patch) != 217566 or hashlib.sha256(patch).hexdigest() != '7d37623e9551601aeaf26abba4e045f4a333dda40de123361a33026b5b7c8092':
              raise SystemExit('raw patch identity mismatch')
          path = Path(os.environ['RUNNER_TEMP']) / 'blocker.patch'
          path.write_bytes(patch)
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
              f.write(f'FEATURE_PATCH={path}\n')
          '@ | python -
          if ($LASTEXITCODE -ne 0) { throw 'Patch reconstruction failed' }
          git apply --check --binary $env:FEATURE_PATCH
          if ($LASTEXITCODE -ne 0) { throw 'Patch does not apply to current main' }
          git apply --binary $env:FEATURE_PATCH
          if ($LASTEXITCODE -ne 0) { throw 'Patch application failed' }
          @'
          from pathlib import Path
          path = Path('tests/test_execution_run_history.py')
          source = path.read_text(encoding='utf-8')
          for suffix in ('json', 'md'):
              old = f'workspace / "runs" / "run-blocked" / "test_execution_blockers.{suffix}"'
              new = f'workspace.resolve() / "runs" / "run-blocked" / "test_execution_blockers.{suffix}"'
              if old in source:
                  source = source.replace(old, new)
              elif new not in source:
                  raise SystemExit(f'missing path assertion: {old}')
          path.write_text(source, encoding='utf-8')
          '@ | python -
          if ($LASTEXITCODE -ne 0) { throw 'Windows path normalization failed' }
          Remove-Item .sdd -Recurse -Force -ErrorAction SilentlyContinue
          Get-ChildItem .github\workflows -Filter '*test-execution-blocker-report*.yml' -File -ErrorAction SilentlyContinue | Remove-Item -Force
          if (-not (Test-Path .\src\unit_test_runner\execution\blocker_analyzer.py -PathType Leaf)) { throw 'Missing blocker analyzer' }
          if (-not (Select-String .\src\unit_test_runner\contracts\kinds.py -SimpleMatch 'TEST_EXECUTION_BLOCKER_REPORT')) { throw 'Missing blocker artifact kind' }
          if (-not (Select-String .\vscode\extension\src\extension.ts -SimpleMatch 'testExecutionBlockers')) { throw 'Missing VS Code integration' }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw 'git diff --check failed' }
          git config user.name OpenAI
          git config user.email noreply@openai.com
          git add -A
          if ((git diff --cached --name-only).Count -eq 0) { throw 'No feature diff' }
          git commit -m 'feat: add test execution blocker reports'
          if ($LASTEXITCODE -ne 0) { throw 'Feature commit failed' }
          $featureSha = (git rev-parse HEAD).Trim()
          $parents = @((git rev-list --parents -n 1 HEAD).Split(' ', [System.StringSplitOptions]::RemoveEmptyEntries))
          if ($parents.Count -ne 2 -or $parents[1] -ne $mainSha) { throw 'Feature commit is not a direct child of current main' }
          "MERGE_MODE=fast-forward" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "FEATURE_SHA=$featureSha" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Run standard distribution build
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build_distribution.ps1
          if ($LASTEXITCODE -ne 0) { throw "Standard build failed: $LASTEXITCODE" }
          if (-not (Test-Path .\dist\unit-test-runner.exe -PathType Leaf)) { throw 'Missing dist CLI' }
          if (-not (Test-Path .\dist\unit-test-runner-vscode-0.1.0.vsix -PathType Leaf)) { throw 'Missing dist VSIX' }
          if ((git status --porcelain --untracked-files=no).Count -ne 0) { git status --short; throw 'Build modified tracked files' }

      - name: Verify VSIX bundled CLI
        shell: pwsh
        run: |
          $zip = Join-Path $env:RUNNER_TEMP 'extension.zip'
          Copy-Item .\dist\unit-test-runner-vscode-0.1.0.vsix $zip -Force
          $out = Join-Path $env:RUNNER_TEMP 'extension'
          Expand-Archive $zip $out -Force
          $bundled = Get-ChildItem $out -Recurse -Filter unit-test-runner.exe -File | Select-Object -First 1
          if ($null -eq $bundled) { throw 'Bundled CLI missing from VSIX' }
          $a = (Get-FileHash .\dist\unit-test-runner.exe -Algorithm SHA256).Hash
          $b = (Get-FileHash $bundled.FullName -Algorithm SHA256).Hash
          if ($a -ne $b) { throw "Bundled CLI differs from dist CLI: $a != $b" }
          "CLI_SHA256=$a" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload verified distribution
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-runner-blocker-report-formal-distribution
          path: |
            dist/unit-test-runner.exe
            dist/unit-test-runner-vscode-0.1.0.vsix
          if-no-files-found: error
          retention-days: 14

      - name: Publish and merge verified commit
        shell: pwsh
        run: |
          git push origin HEAD:refs/heads/feat/test-execution-blocker-report-formal --force
          if ($LASTEXITCODE -ne 0) { throw 'Formal branch push failed' }
          if ($env:MERGE_MODE -eq 'fast-forward') {
            git fetch origin main
            $remote = (git rev-parse origin/main).Trim()
            if ($remote -ne $env:BASE_MAIN_SHA) { throw "main changed during verification: $env:BASE_MAIN_SHA -> $remote" }
            git push origin HEAD:refs/heads/main --force-with-lease=refs/heads/main:$env:BASE_MAIN_SHA
            if ($LASTEXITCODE -ne 0) { throw 'main fast-forward failed' }
          }
          git fetch origin main
          $merged = (git rev-parse origin/main).Trim()
          if ($merged -ne $env:FEATURE_SHA) { throw "main does not equal verified feature commit: $merged != $env:FEATURE_SHA" }
          $status = [ordered]@{
            status = 'merged'
            main_sha = $merged
            mode = $env:MERGE_MODE
            cli_sha256 = $env:CLI_SHA256
            verified_at_utc = (Get-Date).ToUniversalTime().ToString('o')
          } | ConvertTo-Json
          $status | Out-File (Join-Path $env:RUNNER_TEMP 'formal-merge-status.json') -Encoding utf8

      - name: Upload formal merge status
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-runner-blocker-report-formal-merge-status
          path: ${{ runner.temp }}/formal-merge-status.json
          if-no-files-found: error
          retention-days: 30
