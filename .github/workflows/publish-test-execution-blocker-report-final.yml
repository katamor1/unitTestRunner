name: Publish Formal Test Execution Blocker Report Commit

on:
  push:
    branches:
      - staging/test-execution-blocker-report-final-20260721
  pull_request:
    branches:
      - main
    types:
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write

concurrency:
  group: publish-test-execution-blocker-report-final-20260722
  cancel-in-progress: false

jobs:
  publish-clean-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: staging/test-execution-blocker-report-final-20260721
          fetch-depth: 0

      - name: Verify exact patch and main base
        shell: bash
        run: |
          set -euo pipefail
          expected_base="$(tr -d '\r\n' < .formal/base-sha.txt)"
          git fetch origin main
          actual_base="$(git rev-parse origin/main)"
          test "$actual_base" = "$expected_base"
          python - <<'PY'
          import base64
          import gzip
          import hashlib
          from pathlib import Path

          encoded = Path('.formal/feature.patch.gz.b64').read_text(encoding='ascii')
          compressed = base64.b64decode(encoded, validate=True)
          patch = gzip.decompress(compressed)
          expected = Path('.formal/patch-sha256.txt').read_text(encoding='ascii').strip()
          actual = hashlib.sha256(patch).hexdigest()
          if actual != expected:
              raise SystemExit(f'patch SHA-256 mismatch: expected {expected}, got {actual}')
          Path('.formal/feature.patch').write_bytes(patch)
          print(f'patch_bytes={len(patch)} sha256={actual}')
          PY
          git apply --check --binary .formal/feature.patch
          git apply --binary .formal/feature.patch
          rm -f .formal/feature.patch
          git add -A
          git diff --cached --check

      - name: Create and push one clean formal commit
        shell: bash
        run: |
          set -euo pipefail
          base="$(tr -d '\r\n' < .formal/base-sha.txt)"
          final_branch='feat/test-execution-blocker-report-final-20260721'
          rm -rf .formal
          rm -f .github/workflows/stage-test-execution-blocker-report-final.yml
          rm -f .github/workflows/publish-test-execution-blocker-report-final.yml
          git add -A
          git diff --cached --check
          if git ls-files -- .formal .github/workflows/stage-test-execution-blocker-report-final.yml .github/workflows/publish-test-execution-blocker-report-final.yml | grep -q .; then
            echo 'Temporary staging files remain in the clean index.' >&2
            exit 1
          fi
          git config user.name OpenAI
          git config user.email noreply@openai.com
          tree="$(git write-tree)"
          clean_commit="$(printf '%s\n' 'feat: add test execution blocker reports' | git commit-tree "$tree" -p "$base")"
          test -n "$clean_commit"
          git push origin "${clean_commit}:refs/heads/${final_branch}"
          {
            echo "clean_commit=$clean_commit"
            echo "final_branch=$final_branch"
          } >> "$GITHUB_STEP_SUMMARY"
