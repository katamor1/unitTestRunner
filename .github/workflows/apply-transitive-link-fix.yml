name: Apply Transitive Link Fix

on:
  push:
    branches:
      - fix/transitive-real-dependency-link

permissions:
  contents: write

concurrency:
  group: apply-transitive-link-fix
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: fix/transitive-real-dependency-link
          fetch-depth: 0

      - name: Detect staged payload
        id: staged
        shell: bash
        run: |
          if [[ -f .sdd/ready && -f .sdd/commit-message.txt && -f .sdd/transitive-link-fix.sha256 ]] && compgen -G '.sdd/transitive-link-fix.tar.gz.b64.*' >/dev/null; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.staged.outputs.present == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        if: steps.staged.outputs.present == 'true'
        shell: bash
        run: |
          python -m pip install "setuptools>=61" wheel
          python -m pip install -e ".[test]"

      - name: Apply and verify fix
        if: steps.staged.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cat .sdd/transitive-link-fix.tar.gz.b64.* > /tmp/transitive-link-fix.b64
          python - <<'PY'
          import base64
          import hashlib
          from pathlib import Path

          encoded = Path('/tmp/transitive-link-fix.b64').read_bytes()
          payload = base64.b64decode(encoded, validate=True)
          expected = Path('.sdd/transitive-link-fix.sha256').read_text(encoding='utf-8').strip()
          actual = hashlib.sha256(payload).hexdigest()
          if actual != expected:
              raise SystemExit(f'payload SHA-256 mismatch: expected {expected}, got {actual}')
          Path('/tmp/transitive-link-fix.tar.gz').write_bytes(payload)
          print(f'payload_bytes={len(payload)} sha256={actual}')
          PY
          tar -xzf /tmp/transitive-link-fix.tar.gz -C .
          python -m compileall -q src tests
          python -m unittest \
            tests.test_dependency_policy_analyzer \
            tests.test_dependency_real_source_inclusion \
            tests.test_dependency_policy_end_to_end -v
          git diff --check

      - name: Commit verified fix
        if: steps.staged.outputs.present == 'true' && success()
        shell: bash
        env:
          BRANCH: fix/transitive-real-dependency-link
        run: |
          message="$(cat .sdd/commit-message.txt)"
          rm -rf .sdd
          rm -f .github/workflows/apply-transitive-link-fix.yml
          git config user.name OpenAI
          git config user.email noreply@openai.com
          git add -A
          git commit -m "$message"
          git push origin "HEAD:$BRANCH"
