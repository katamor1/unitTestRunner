name: Formalize Test Execution Blocker Report

on:
  push:
    branches:
      - feat/test-execution-blocker-report-formal
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write

concurrency:
  group: formalize-test-execution-blocker-report
  cancel-in-progress: false

jobs:
  formalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: feat/test-execution-blocker-report-formal
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: vscode/extension/package-lock.json

      - name: Recover and verify reviewed implementation patch
        shell: pwsh
        run: |
          @'
          import hashlib
          import subprocess
          from pathlib import Path

          source_commit = "a24b7cde6dd83a11307aed20da1bf0bcc4aeaacb"
          patch = subprocess.check_output(
              ["git", "show", f"{source_commit}:.sdd/patch.part.00"]
          )
          expected = subprocess.check_output(
              ["git", "show", f"{source_commit}:.sdd/patch.sha256"]
          ).decode("utf-8").strip()
          actual = hashlib.sha256(patch).hexdigest()
          if actual != expected:
              raise SystemExit(
                  f"reviewed patch SHA-256 mismatch: expected {expected}, got {actual}"
              )
          path = Path(".formal-test-execution-blocker-report.patch")
          path.write_bytes(patch)
          print(f"patch_bytes={len(patch)} sha256={actual}")
          '@ | python -
          git apply --check --binary .formal-test-execution-blocker-report.patch
          git apply --binary .formal-test-execution-blocker-report.patch
          git diff --check

      - name: Verify expected implementation files
        shell: pwsh
        run: |
          $required = @(
            'src\unit_test_runner\schemas\test_execution_blocker_report.schema.json',
            'src\unit_test_runner\execution\blocker_models.py',
            'src\unit_test_runner\execution\blocker_analyzer.py',
            'src\unit_test_runner\execution\blocker_report_writer.py',
            'tests\test_execution_blocker_contract.py',
            'tests\test_execution_blocker_analyzer.py',
            'tests\test_execution_blocker_publication.py',
            'tests\test_execution_blocker_cli.py',
            'vscode\extension\src\executionBlockers\contracts.ts',
            'vscode\extension\src\executionBlockers\state.ts',
            'vscode\extension\src\executionBlockers\verifier.ts',
            'vscode\extension\src\executionBlockers\restoration.ts',
            'vscode\extension\src\executionBlockers\workflowIntegration.ts'
          )
          foreach ($path in $required) {
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "Reviewed patch did not create required file: $path"
            }
          }
          if (-not (Select-String -LiteralPath 'src\unit_test_runner\contracts\kinds.py' -SimpleMatch 'TEST_EXECUTION_BLOCKER_REPORT')) {
            throw 'Artifact kind TEST_EXECUTION_BLOCKER_REPORT is missing.'
          }
          if (-not (Select-String -LiteralPath 'vscode\extension\package.json' -SimpleMatch 'unitTestRunner.resolveExecutionBlocker')) {
            throw 'VS Code blocker-resolution command is missing.'
          }
          $changed = @(git diff --name-only origin/main)
          if ($changed.Count -lt 20) {
            throw "Implementation patch is unexpectedly small: $($changed.Count) changed files"
          }
          Write-Host "Changed files after patch: $($changed.Count)"

      - name: Build through the standard distribution script
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build_distribution.ps1
          if (-not (Test-Path -LiteralPath .\dist\unit-test-runner.exe -PathType Leaf)) {
            throw 'Standard build did not produce dist\unit-test-runner.exe'
          }
          if (-not (Test-Path -LiteralPath .\dist\unit-test-runner-vscode-0.1.0.vsix -PathType Leaf)) {
            throw 'Standard build did not produce dist\unit-test-runner-vscode-0.1.0.vsix'
          }

      - name: Verify bundled CLI identity and blocker support
        shell: pwsh
        run: |
          $expanded = Join-Path $env:RUNNER_TEMP 'unit-test-runner-vsix'
          if (Test-Path -LiteralPath $expanded) {
            Remove-Item -LiteralPath $expanded -Recurse -Force
          }
          Expand-Archive -LiteralPath .\dist\unit-test-runner-vscode-0.1.0.vsix -DestinationPath $expanded -Force
          $bundled = Join-Path $expanded 'extension\bin\win32-x64\unit-test-runner.exe'
          if (-not (Test-Path -LiteralPath $bundled -PathType Leaf)) {
            throw 'VSIX does not contain extension\bin\win32-x64\unit-test-runner.exe'
          }
          $standaloneHash = (Get-FileHash -Algorithm SHA256 -LiteralPath .\dist\unit-test-runner.exe).Hash
          $bundledHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $bundled).Hash
          if ($standaloneHash -ne $bundledHash) {
            throw "Bundled CLI SHA-256 mismatch: standalone=$standaloneHash bundled=$bundledHash"
          }
          $schema = Join-Path $expanded 'extension\bin\win32-x64\_internal\unit_test_runner\schemas\test_execution_blocker_report.schema.json'
          if (-not (Test-Path -LiteralPath $schema -PathType Leaf)) {
            throw 'Bundled CLI does not contain test_execution_blocker_report.schema.json'
          }
          Write-Host "Bundled CLI SHA-256: $standaloneHash"

      - name: Upload standard distribution outputs
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-runner-test-execution-blocker-report-standard-distribution
          path: |
            dist/unit-test-runner.exe
            dist/unit-test-runner-vscode-0.1.0.vsix
          if-no-files-found: error
          retention-days: 7

      - name: Create one clean formal commit
        shell: pwsh
        run: |
          Remove-Item -LiteralPath .formal-test-execution-blocker-report.patch -Force
          Remove-Item -LiteralPath .github\workflows\formalize-test-execution-blocker-report.yml -Force
          if (Test-Path -LiteralPath .sdd) {
            Remove-Item -LiteralPath .sdd -Recurse -Force
          }
          git config user.name OpenAI
          git config user.email noreply@openai.com
          git add -A
          $base = (git rev-parse origin/main).Trim()
          $changed = @(git diff --cached --name-only $base)
          if ($changed.Count -lt 20) {
            throw "Formal commit is unexpectedly small: $($changed.Count) changed files"
          }
          $tree = (git write-tree).Trim()
          $message = 'feat: add test execution blocker reports'
          $commit = ($message | git commit-tree $tree -p $base).Trim()
          if (-not $commit) {
            throw 'git commit-tree did not return a commit SHA'
          }
          git push --force origin "$commit`:refs/heads/feat/test-execution-blocker-report-formal"
          Write-Host "Formal commit: $commit"
