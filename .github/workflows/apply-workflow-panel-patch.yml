name: Apply Workflow Panel Patch

on:
  push:
    branches:
      - feature/header-reference-build-workspace
    paths:
      - .github/workflows/apply-workflow-panel-patch.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/header-reference-build-workspace
          fetch-depth: 0

      - name: Verify patch
        run: git apply --check .github/patches/workflow-panel-label-consistency.patch

      - name: Apply workflow panel changes
        run: git apply .github/patches/workflow-panel-label-consistency.patch

      - name: Remove temporary implementation helpers
        run: |
          rm .github/patches/workflow-panel-label-consistency.patch
          rm .github/workflows/apply-workflow-panel-patch.yml
          rm .github/workflows/export-vscode-workspace.yml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vscode/extension/src/workflow/workflowPanelBase.ts vscode/extension/README.md .github
          git commit -m "Unify simple and detailed workflow panel labels"
          git push origin HEAD:feature/header-reference-build-workspace
