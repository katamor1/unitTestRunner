name: Diagnose Phase 1 Task 6 materialization

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout bootstrap branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct patch and inspect remote base
        shell: bash
        run: |
          set -u
          diagnostics="$RUNNER_TEMP/p1t6-diagnostics.txt"
          cat .github/bootstrap/p1t6-final/chunk-*.b64 \
            | tr -d '\r\n' > "$RUNNER_TEMP/task6.patch.gz.b64"
          base64 --decode "$RUNNER_TEMP/task6.patch.gz.b64" > "$RUNNER_TEMP/task6.patch.gz"
          python - "$RUNNER_TEMP/task6.patch.gz" "$RUNNER_TEMP/task6.patch" <<'PY'
          import gzip
          import pathlib
          import sys
          source, destination = map(pathlib.Path, sys.argv[1:])
          destination.write_bytes(gzip.decompress(source.read_bytes()))
          PY
          git fetch origin codex/p1t6-review-decisions-readiness
          git checkout -B codex/p1t6-review-decisions-readiness \
            origin/codex/p1t6-review-decisions-readiness
          {
            echo "head=$(git rev-parse HEAD)"
            echo "base_tree=$(git rev-parse HEAD^{tree})"
            echo "status_before_begin"
            git status --short --branch
            echo "status_before_end"
          } > "$diagnostics"
          tar --exclude=.git -czf "$RUNNER_TEMP/p1t6-remote-base.tgz" .
          set +e
          git apply --check --verbose "$RUNNER_TEMP/task6.patch" >> "$diagnostics" 2>&1
          check_status=$?
          echo "apply_check_status=$check_status" >> "$diagnostics"
          if [ "$check_status" -eq 0 ]; then
            git apply --verbose "$RUNNER_TEMP/task6.patch" >> "$diagnostics" 2>&1
            apply_status=$?
            echo "apply_status=$apply_status" >> "$diagnostics"
            if [ "$apply_status" -eq 0 ]; then
              git add -A
              echo "actual_tree=$(git write-tree)" >> "$diagnostics"
              git diff --cached --stat >> "$diagnostics" 2>&1
              git diff --cached --name-status >> "$diagnostics" 2>&1
            fi
          fi
          cat "$diagnostics"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p1t6-materialization-diagnostics
          path: |
            ${{ runner.temp }}/p1t6-diagnostics.txt
            ${{ runner.temp }}/p1t6-remote-base.tgz
          if-no-files-found: error
          retention-days: 1
