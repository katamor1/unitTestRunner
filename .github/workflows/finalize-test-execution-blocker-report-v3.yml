name: Finalize Test Execution Blocker Report V3

on:
  push:
    branches:
      - stage/test-execution-blocker-report-v3
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write

concurrency:
  group: finalize-test-execution-blocker-report-v3
  cancel-in-progress: false

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: stage/test-execution-blocker-report-v3
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: vscode/extension/package-lock.json

      - name: Reconstruct exact reviewed patch
        shell: pwsh
        run: |
          @'
          import base64
          import gzip
          import hashlib
          from pathlib import Path

          parts = []
          for index in range(31):
              split_parts = sorted(Path('.sdd').glob(f'feature.patch.gz.b64.{index:03d}.*'))
              if split_parts:
                  parts.extend(split_parts)
                  continue
              exact = Path('.sdd') / f'feature.patch.gz.b64.{index:03d}'
              if not exact.is_file():
                  raise SystemExit(f'Missing patch chunk {index:03d}')
              parts.append(exact)
          encoded = b''.join(part.read_bytes() for part in parts)
          compressed = base64.b64decode(encoded, validate=True)
          patch = gzip.decompress(compressed)
          expected = Path('.sdd/patch.sha256').read_text(encoding='utf-8').strip()
          actual = hashlib.sha256(patch).hexdigest()
          if actual != expected:
              raise SystemExit(f'patch SHA-256 mismatch: expected {expected}, got {actual}')
          temp = Path(r'${{ runner.temp }}')
          (temp / 'feature.patch').write_bytes(patch)
          (temp / 'windows-path-fix.patch').write_bytes(Path('.sdd/windows-path-fix.patch').read_bytes())
          print(f'patch_bytes={len(patch)} sha256={actual} files={len(parts)}')
          '@ | python -

      - name: Create clean one-parent feature commit
        shell: pwsh
        run: |
          git fetch origin main
          git reset --hard origin/main
          git clean -fdx
          $patch = Join-Path $env:RUNNER_TEMP 'feature.patch'
          $windowsFix = Join-Path $env:RUNNER_TEMP 'windows-path-fix.patch'
          git apply --check --binary $patch
          git apply --binary $patch
          git apply --check $windowsFix
          git apply $windowsFix
          git diff --check
          if (-not (Test-Path -LiteralPath .\src\unit_test_runner\execution\blocker_analyzer.py -PathType Leaf)) {
            throw 'Applied feature does not contain blocker_analyzer.py'
          }
          if (-not (Select-String -LiteralPath .\src\unit_test_runner\contracts\kinds.py -SimpleMatch 'TEST_EXECUTION_BLOCKER_REPORT')) {
            throw 'Applied feature does not register the blocker artifact kind'
          }
          if (-not (Select-String -LiteralPath .\vscode\extension\src\extension.ts -SimpleMatch 'testExecutionBlockers')) {
            throw 'Applied feature does not contain VS Code blocker integration'
          }
          git config user.name OpenAI
          git config user.email noreply@openai.com
          git add -A
          git commit -m 'feat: add test execution blocker reports'

      - name: Build through the standard distribution script
        shell: pwsh
        run: |
          $buildLog = Join-Path $env:RUNNER_TEMP 'build-distribution.log'
          & powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build_distribution.ps1 *>&1 | Tee-Object -FilePath $buildLog
          if ($LASTEXITCODE -ne 0) {
            throw "Standard distribution build failed with exit code $LASTEXITCODE"
          }
          if (-not (Test-Path -LiteralPath .\dist\unit-test-runner.exe -PathType Leaf)) {
            throw 'Standard build did not produce dist\unit-test-runner.exe'
          }
          if (-not (Test-Path -LiteralPath .\dist\unit-test-runner-vscode-0.1.0.vsix -PathType Leaf)) {
            throw 'Standard build did not produce dist\unit-test-runner-vscode-0.1.0.vsix'
          }
          if ((git status --porcelain --untracked-files=no).Count -ne 0) {
            git status --short
            throw 'Standard build modified tracked source files'
          }

      - name: Upload standard build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-runner-blocker-report-build-log
          path: ${{ runner.temp }}/build-distribution.log
          if-no-files-found: warn
          retention-days: 7

      - name: Upload verified standard distribution
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-runner-blocker-report-standard-distribution
          path: |
            dist/unit-test-runner.exe
            dist/unit-test-runner-vscode-0.1.0.vsix
          if-no-files-found: error
          retention-days: 14

      - name: Publish clean feature branch
        shell: pwsh
        run: |
          git push origin HEAD:refs/heads/feat/test-execution-blocker-report-formal --force
