      - name: Apply Japanese GUI copy
        shell: pwsh
        run: |
          $script = Join-Path $env:RUNNER_TEMP 'apply_japanese_gui_copy.py'
          python $script

      - name: Install VS Code extension dependencies
        working-directory: vscode/extension
        run: npm ci

      - name: Run VS Code extension tests
        working-directory: vscode/extension
        run: npm.cmd test

      - name: Remove one-off workflow
        shell: pwsh
        run: Remove-Item .github/workflows/apply-japanese-gui-copy.yml

      - name: Commit and push implementation
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "feat: improve Japanese GUI copy"
            git push origin HEAD:chore/japanese-gui-copy
          }
