name: Apply Japanese GUI copy

on:
  push:
    branches:
      - chore/japanese-gui-copy
    paths:
      - .github/workflows/apply-japanese-gui-copy.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: windows-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: chore/japanese-gui-copy
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode/extension/package-lock.json

      - name: Restore one-off patch script
        shell: pwsh
        env:
          PATCH_BLOB_SHA: 80280b54dafb9a80e19f6af5973901c9e38aec1a
          GH_TOKEN: ${{ github.token }}
        run: |
          $archive = Join-Path $env:RUNNER_TEMP 'apply_japanese_gui_copy.py.gz'
          $script = Join-Path $env:RUNNER_TEMP 'apply_japanese_gui_copy.py'
          $encoded = gh api "repos/$env:GITHUB_REPOSITORY/git/blobs/$env:PATCH_BLOB_SHA" --jq .content
          [IO.File]::WriteAllBytes($archive, [Convert]::FromBase64String(($encoded -replace '\s', '')))
          $input = [IO.File]::OpenRead($archive)
          $gzip = [IO.Compression.GzipStream]::new($input, [IO.Compression.CompressionMode]::Decompress)
          $output = [IO.File]::Create($script)
          $gzip.CopyTo($output)
          $output.Dispose()
          $gzip.Dispose()
          $input.Dispose()

      - name: Apply Japanese GUI copy
        id: apply
        shell: pwsh
        run: |
          $script = Join-Path $env:RUNNER_TEMP 'apply_japanese_gui_copy.py'
          $log = Join-Path $env:RUNNER_TEMP 'apply-japanese-gui-copy.log'
          $captured = & python $script 2>&1
          $code = $LASTEXITCODE
          $captured | Tee-Object -FilePath $log
          "exit_code=$code" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          exit 0

      - name: Install dependencies and run tests
        id: verify
        if: steps.apply.outputs.exit_code == '0'
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP 'verify-japanese-gui-copy.log'
          Push-Location vscode/extension
          $captured = & npm.cmd ci 2>&1
          $code = $LASTEXITCODE
          if ($code -eq 0) {
            $testOutput = & npm.cmd test 2>&1
            $code = $LASTEXITCODE
            $captured = @($captured) + @($testOutput)
          }
          Pop-Location
          $captured | Tee-Object -FilePath $log
          "exit_code=$code" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          exit 0

      - name: Persist failure diagnostics
        if: steps.apply.outputs.exit_code != '0' || steps.verify.outputs.exit_code != '0'
        shell: pwsh
        run: |
          git reset --hard HEAD
          $destination = '.github/apply-japanese-gui-copy.log'
          "=== patch ===" | Set-Content -Path $destination -Encoding utf8
          $applyLog = Join-Path $env:RUNNER_TEMP 'apply-japanese-gui-copy.log'
          if (Test-Path $applyLog) {
            Get-Content $applyLog | Add-Content -Path $destination -Encoding utf8
          }
          "=== verification ===" | Add-Content -Path $destination -Encoding utf8
          $verifyLog = Join-Path $env:RUNNER_TEMP 'verify-japanese-gui-copy.log'
          if (Test-Path $verifyLog) {
            Get-Content $verifyLog | Add-Content -Path $destination -Encoding utf8
          }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $destination
          git commit -m "chore: record Japanese GUI copy automation failure"
          git push origin HEAD:chore/japanese-gui-copy
          exit 1

      - name: Commit and push implementation
        if: steps.apply.outputs.exit_code == '0' && steps.verify.outputs.exit_code == '0'
        shell: pwsh
        run: |
          Remove-Item .github/workflows/apply-japanese-gui-copy.yml
          if (Test-Path .github/apply-japanese-gui-copy.log) {
            Remove-Item .github/apply-japanese-gui-copy.log
          }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "feat: improve Japanese GUI copy"
            git push origin HEAD:chore/japanese-gui-copy
          }
