name: Export Japanese GUI copy patch

on:
  push:
    branches:
      - chore/japanese-gui-copy
    paths:
      - .github/workflows/export-japanese-gui-copy-patch.yml

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decode patch script
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/git/blobs/80280b54dafb9a80e19f6af5973901c9e38aec1a" --jq .content \
            | tr -d '\n' \
            | base64 --decode \
            | gzip --decompress \
            > .github/japanese-gui-copy.patch.py
          python -m py_compile .github/japanese-gui-copy.patch.py
      - uses: actions/upload-artifact@v4
        with:
          name: japanese-gui-copy-patch
          path: .github/japanese-gui-copy.patch.py
          if-no-files-found: error
          retention-days: 1
      - name: Publish decoded patch for deterministic repair
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/japanese-gui-copy.patch.py
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: expose Japanese GUI copy patch for repair"
          git push origin HEAD:chore/japanese-gui-copy
