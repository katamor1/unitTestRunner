        run: |
          printf '%s' "$PATCH_GZ_B64" | tr -d '\n' | base64 -d | gzip -d > "$RUNNER_TEMP/settings-timeout.patch"
          git apply --check "$RUNNER_TEMP/settings-timeout.patch"
          git apply "$RUNNER_TEMP/settings-timeout.patch"

      - name: Run focused Python tests
        shell: bash
        run: |
          python -m unittest -v \
            tests.test_process_control \
            tests.test_execution_crash_reconciliation \
            tests.test_verification_build_toolchain \
            tests.test_build_workspace_generation

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode/extension/package-lock.json

      - name: Run focused VS Code extension tests
        working-directory: vscode/extension
        shell: bash
        run: |
          npm ci
          npm run compile
          node --test \
            dist/test/settingsPersistence.test.js \
            dist/test/processTree.test.js \
            dist/test/workflowPanel.test.js

      - name: Commit implementation and remove one-time workflow
        shell: bash
        run: |
          git rm .github/workflows/export-full-repo-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Persist settings panel state and terminate timed-out process trees"
          git push origin HEAD:feature/header-reference-build-workspace
