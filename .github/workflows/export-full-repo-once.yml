name: Export Full Repository Once

on:
  push:
    branches:
      - feature/header-reference-build-workspace
    paths:
      - .github/workflows/export-full-repo-once.yml
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/header-reference-build-workspace
          fetch-depth: 0
      - name: Archive repository including Git metadata
        shell: bash
        run: tar --exclude=full-repo.tgz -czf full-repo.tgz .
      - name: Upload repository archive
        uses: actions/upload-artifact@v4
        with:
          name: full-repository-workspace
          path: full-repo.tgz
          retention-days: 1
