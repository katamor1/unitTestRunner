name: Apply review ledger binary fix

on:
  push:
    branches:
      - codex/integrate-all-plans

permissions:
  contents: write

concurrency:
  group: apply-review-ledger-binary-fix
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout product branch
        uses: actions/checkout@v4
        with:
          ref: codex/integrate-all-plans
          fetch-depth: 0

      - name: Verify one-shot bootstrap commit
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD^)" = "81bcc82a0a646cce370ba22b5557e3224064677f"
          test "$(git diff --name-only HEAD^..HEAD)" = ".github/workflows/apply-review-ledger-binary-fix.yml"

      - name: Apply Windows binary-mode fix
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("src/unit_test_runner/dossier/review_decision_repository.py")
          text = path.read_text(encoding="utf-8")
          old = '''def _write_exclusive_fsync(path: Path, data: bytes) -> None:
              flags = os.O_CREAT | os.O_EXCL | os.O_WRONLY
              if hasattr(os, "O_NOFOLLOW"):
                  flags |= os.O_NOFOLLOW
          '''
          new = '''def _write_exclusive_fsync(path: Path, data: bytes) -> None:
              # Windows CRT text mode translates LF to CRLF even for os.write().
              # Contract artifacts must preserve the exact validated byte sequence.
              flags = os.O_CREAT | os.O_EXCL | os.O_WRONLY | getattr(os, "O_BINARY", 0)
              if hasattr(os, "O_NOFOLLOW"):
                  flags |= os.O_NOFOLLOW
          '''
          if old not in text:
              raise SystemExit("review ledger write block not found")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          git rm .github/workflows/apply-review-ledger-binary-fix.yml
          git diff --check

      - name: Run focused regression tests
        shell: bash
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          OPENBLAS_NUM_THREADS: "1"
          OMP_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
          NUMEXPR_NUM_THREADS: "1"
        run: |
          set -euo pipefail
          python -m pip install -e .
          python -m unittest tests.test_review_decisions -v
          python -m unittest tests.test_review_decision_cli.ReviewDecisionCLITests.test_discovery_and_write_share_exact_guards_and_four_axes -v
          python -m unittest tests.test_review_decision_cli.ReviewDecisionCLITests.test_guard_failures_are_nonzero_and_preserve_ledger_bytes -v
          python -m unittest tests.test_review_decision_cli.ReviewDecisionCLITests.test_invalid_existing_ledger_is_nonzero_and_never_rewritten -v
          python -m unittest tests.test_review_decision_cli.ReviewDecisionCLITests.test_subprocess_discovery_exit_matches_envelope -v
          python -m compileall -q src tests

      - name: Publish clean final tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/unit_test_runner/dossier/review_decision_repository.py
          git commit -m "fix: preserve exact review ledger bytes on Windows"
          test "$(git rev-parse HEAD^{tree})" = "3127b32315304768626f2552f699181e8f5ff62a"
          git push origin HEAD:refs/heads/codex/integrate-all-plans
