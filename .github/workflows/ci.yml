name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  source-integrity:
    name: Source integrity
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install "setuptools>=61" wheel
          python -m pip install -e .

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode/extension/package-lock.json

      - name: Install VS Code extension dependencies
        working-directory: vscode/extension
        run: npm ci

      - name: Verify tracked Python sources
        run: |
          git ls-files --error-unmatch src/unit_test_runner/build/dependency_rewriter.py
          if ($LASTEXITCODE -ne 0) { throw "dependency_rewriter.py is not tracked" }
          git check-ignore --no-index -q src/unit_test_runner/build/dependency_rewriter.py
          if ($LASTEXITCODE -eq 0) { throw "Python build package source is ignored" }
          python -m compileall -q src tests
          python -m unittest tests.test_repository_source_tracking -v

      - name: Compile VS Code extension
        working-directory: vscode/extension
        run: npm.cmd run compile

  python-tests:
    name: Python tests
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install "setuptools>=61" wheel
          python -m pip install -e .

      - name: Run Python tests in isolated processes
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP "python-tests.log"
          $modules = Get-ChildItem -LiteralPath .\tests -Filter 'test_*.py' -File |
            Sort-Object Name |
            ForEach-Object { 'tests.' + $_.BaseName }
          $failed = @()
          foreach ($module in $modules) {
            "`n=== $module ===" | Tee-Object -FilePath $log -Append
            & python -m unittest $module -v *>&1 |
              Tee-Object -FilePath $log -Append
            if ($LASTEXITCODE -ne 0) { $failed += $module }
          }
          "isolated_modules=$($modules.Count) failures=$($failed.Count)" |
            Tee-Object -FilePath $log -Append
          if ($failed.Count -ne 0) {
            throw ('isolated Python failures: ' + ($failed -join ', '))
          }

      - name: Upload Python failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-failure
          path: ${{ runner.temp }}\python-tests.log

  vscode-tests:
    name: VS Code unit tests
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode/extension/package-lock.json

      - name: Install dependencies
        working-directory: vscode/extension
        run: npm ci

      - name: Run VS Code extension tests
        working-directory: vscode/extension
        run: |
          $log = Join-Path $env:RUNNER_TEMP "vscode-tests.log"
          & npm.cmd test *>&1 | Tee-Object -FilePath $log
          $testExit = $LASTEXITCODE
          if ($testExit -ne 0) { exit $testExit }

      - name: Upload VS Code unit-test failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vscode-unit-test-failure
          path: ${{ runner.temp }}\vscode-tests.log

  vscode-activation:
    name: VS Code Extension Host activation
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode/extension/package-lock.json

      - name: Install dependencies
        working-directory: vscode/extension
        run: npm ci

      - name: Run Extension Host smoke test
        working-directory: vscode/extension
        run: |
          $log = Join-Path $env:RUNNER_TEMP "vscode-activation.log"
          & npm.cmd run test:extension-host *>&1 | Tee-Object -FilePath $log
          $testExit = $LASTEXITCODE
          if ($testExit -ne 0) { exit $testExit }

      - name: Upload Extension Host failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vscode-activation-failure
          path: ${{ runner.temp }}\vscode-activation.log

  fixture-smoke:
    name: VC6 fixture smoke
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install "setuptools>=61" wheel
          python -m pip install -e .

      - name: Require host C compiler
        shell: pwsh
        run: |
          $compiler = Get-Command gcc, clang, cc -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if ($null -eq $compiler) {
            throw 'VC6 fixture smoke requires gcc, clang, or cc on PATH.'
          }
          "fixture_compiler=$($compiler.Source)"

      - name: Run fixture smoke
        run: |
          $log = Join-Path $env:RUNNER_TEMP "fixture-smoke.log"
          & python -m unittest tests.test_fixture_cli_smoke tests.test_vc6_fixture_build_e2e -v *>&1 | Tee-Object -FilePath $log
          $testExit = $LASTEXITCODE
          if ($testExit -ne 0) { exit $testExit }

      - name: Upload fixture-smoke failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fixture-smoke-failure
          path: ${{ runner.temp }}\fixture-smoke.log

  package-contract:
    name: Package contract
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and install wheel in a fresh environment
        run: |
          $dist = Join-Path $env:RUNNER_TEMP "unit-test-runner-dist"
          $venv = Join-Path $env:RUNNER_TEMP "unit-test-runner-package-venv"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          python -m pip wheel --no-deps --wheel-dir $dist .
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python -m venv $venv
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $python = Join-Path $venv "Scripts\python.exe"
          $wheel = Get-ChildItem -Path $dist -Filter "unit_test_runner-*.whl" | Select-Object -First 1
          & $python -m pip install $wheel.FullName
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $python -m unit_test_runner --help
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $contractCheck = @'
          import json
          from importlib import resources
          from unit_test_runner.contracts import ArtifactKind

          root = resources.files("unit_test_runner.schemas")
          missing = [
              kind.value
              for kind in ArtifactKind
              if not root.joinpath(f"{kind.value}.schema.json").is_file()
          ]
          common = json.loads(
              root.joinpath("common.schema.json").read_text(encoding="utf-8")
          )
          assert common["additionalProperties"] is False
          assert not missing, missing
          for kind in ArtifactKind:
              schema = json.loads(
                  root.joinpath(f"{kind.value}.schema.json").read_text(
                      encoding="utf-8"
                  )
              )
              overlay = schema["allOf"][-1]
              assert "data" in overlay["properties"], kind.value
          '@
          $contractCheck | & $python -
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
