name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run DSP LIB feature tests
        shell: pwsh
        run: |
          $tests = @(
            "tests.test_vc6_dsp_link_settings",
            "tests.test_vc6_lib32_link_resolution",
            "tests.test_vc6_coff_archive",
            "tests.test_linked_library_call_analysis",
            "tests.test_linked_library_provider_warnings",
            "tests.test_vc6_link_library_resolver",
            "tests.test_dossier_link_context_integration",
            "tests.test_build_workspace_link_libraries",
            "tests.test_vc6_debug_workspace_link_libraries",
            "tests.test_quick_summary_link_resolution",
            "tests.test_linked_library_end_to_end",
            "tests.test_link_only_library_calls"
          )
          foreach ($test in $tests) {
            "=== $test ===" | Tee-Object -FilePath feature-test.log -Append
            py -m unittest $test *>&1 | Tee-Object -FilePath feature-test.log -Append
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Upload feature test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feature-test-log
          path: feature-test.log
          if-no-files-found: warn

      - name: Run full Python suite for baseline comparison
        continue-on-error: true
        run: py -m unittest discover -s tests -p "test_*.py"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode/extension/package-lock.json

      - name: Install VS Code extension dependencies
        working-directory: vscode/extension
        run: npm ci

      - name: Compile VS Code extension
        working-directory: vscode/extension
        run: npm.cmd run compile
