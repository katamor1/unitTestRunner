name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Python tests
        continue-on-error: true
        shell: pwsh
        run: |
          py -m unittest discover -s tests -p "test_*.py" *>&1 | Tee-Object -FilePath python-test.log
          exit $LASTEXITCODE

      - name: Upload Python test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-log
          path: python-test.log
          if-no-files-found: warn

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode/extension/package-lock.json

      - name: Install VS Code extension dependencies
        working-directory: vscode/extension
        run: npm ci

      - name: Run VS Code extension tests
        working-directory: vscode/extension
        shell: pwsh
        run: |
          npm.cmd test *>&1 | Tee-Object -FilePath ..\..\node-test.log
          exit $LASTEXITCODE

      - name: Upload Node test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-test-log
          path: node-test.log
          if-no-files-found: warn
