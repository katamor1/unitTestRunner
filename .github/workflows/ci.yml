name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Python tests
        shell: pwsh
        run: |
          py -m unittest discover -s tests -p "test_*.py" *>&1 | Tee-Object -FilePath python-test.log
          exit $LASTEXITCODE

      - name: Run base Python tests for comparison
        if: always()
        continue-on-error: true
        shell: pwsh
        run: |
          git fetch origin 7f050f4ccfcd09a1c2446604fdfb7ffe116abb15 --depth=1
          git worktree add base-worktree 7f050f4ccfcd09a1c2446604fdfb7ffe116abb15
          Push-Location base-worktree
          py -m unittest discover -s tests -p "test_*.py" *>&1 | Tee-Object -FilePath ..\base-python-test.log
          Pop-Location

      - name: Upload Python test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-logs
          path: |
            python-test.log
            base-python-test.log
          if-no-files-found: warn

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode/extension/package-lock.json

      - name: Install VS Code extension dependencies
        working-directory: vscode/extension
        run: npm ci

      - name: Run VS Code extension tests
        working-directory: vscode/extension
        run: npm.cmd test
