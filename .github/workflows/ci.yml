name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run DSP LIB feature tests
        shell: pwsh
        run: |
          $tests = @(
            "tests\test_vc6_dsp_link_settings.py",
            "tests\test_vc6_lib32_link_resolution.py",
            "tests\test_vc6_coff_archive.py",
            "tests\test_linked_library_call_analysis.py",
            "tests\test_linked_library_provider_warnings.py",
            "tests\test_vc6_link_library_resolver.py",
            "tests\test_dossier_link_context_integration.py",
            "tests\test_build_workspace_link_libraries.py",
            "tests\test_vc6_debug_workspace_link_libraries.py",
            "tests\test_quick_summary_link_resolution.py",
            "tests\test_linked_library_end_to_end.py",
            "tests\test_link_only_library_calls.py"
          )
          foreach ($test in $tests) {
            "=== $test ===" | Tee-Object -FilePath feature-test.log -Append
            py $test *>&1 | Tee-Object -FilePath feature-test.log -Append
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Upload feature test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feature-test-log
          path: feature-test.log
          if-no-files-found: warn

      - name: Run full Python suite for baseline comparison
        continue-on-error: true
        run: py -m unittest discover -s tests -p "test_*.py"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode/extension/package-lock.json

      - name: Install VS Code extension dependencies
        working-directory: vscode/extension
        run: npm ci

      - name: Compile VS Code extension
        working-directory: vscode/extension
        run: npm.cmd run compile
