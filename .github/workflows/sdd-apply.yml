name: SDD Apply Verified Task

on:
  pull_request:

permissions:
  contents: write
  actions: write

concurrency:
  group: sdd-apply-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Detect staged task
        id: staged
        shell: bash
        run: |
          has_payload=false
          has_patch=false
          compgen -G '.sdd/payload.tar.gz.b64.*' > /dev/null && has_payload=true
          { [[ -f .sdd/next.patch ]] || compgen -G '.sdd/next.patch.b64.*' > /dev/null; } && has_patch=true
          if [[ -f .sdd/ready && -f .sdd/verify.sh && -f .sdd/commit-message.txt ]] && \
             { [[ "$has_payload" == true ]] || [[ "$has_patch" == true ]]; }; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Python
        if: steps.staged.outputs.present == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Node
        if: steps.staged.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode/extension/package-lock.json
      - name: Install dependencies
        if: steps.staged.outputs.present == 'true'
        shell: bash
        run: |
          python -m pip install "setuptools>=61" wheel
          python -m pip install -e ".[test]"
          pushd vscode/extension
          npm ci
          popd
      - name: Apply and verify staged task
        if: steps.staged.outputs.present == 'true'
        shell: bash
        run: |
          set -o pipefail
          mkdir -p .sdd/diagnostics
          {
            if compgen -G '.sdd/payload.tar.gz.b64.*' > /dev/null; then
              cp .sdd/payload.tar.gz.b64.* .sdd/diagnostics/
              cat .sdd/payload.tar.gz.b64.* > .sdd/diagnostics/concatenated.b64
              python - <<'PY'
          import base64
          from pathlib import Path

          path = Path('.sdd/diagnostics/concatenated.b64')
          data = path.read_bytes()
          allowed = b'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=\r\n\t '
          invalid = [(index, byte) for index, byte in enumerate(data) if byte not in allowed]
          print(f'encoded_bytes={len(data)} invalid_count={len(invalid)} invalid_head={invalid[:20]}')
          decoded = base64.b64decode(data, validate=True)
          Path('/tmp/payload.tar.gz').write_bytes(decoded)
          PY
              cp /tmp/payload.tar.gz .sdd/diagnostics/payload.tar.gz
              wc -c /tmp/payload.tar.gz
              tar -xzf /tmp/payload.tar.gz -C .
            else
              patch_path=.sdd/next.patch
              if [[ ! -f "$patch_path" ]]; then
                cat .sdd/next.patch.b64.* | base64 --decode > /tmp/next.patch
                patch_path=/tmp/next.patch
              fi
              cp "$patch_path" .sdd/diagnostics/next.patch
              wc -c "$patch_path"
              git apply --check "$patch_path"
              git apply "$patch_path"
            fi
            bash .sdd/verify.sh
          } 2>&1 | tee .sdd/diagnostics/apply.log
      - name: Upload apply diagnostics
        if: failure() && steps.staged.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sdd-apply-diagnostics-${{ github.sha }}
          path: .sdd/diagnostics
          retention-days: 1
      - name: Commit verified task
        if: steps.staged.outputs.present == 'true' && success()
        shell: bash
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
          GH_TOKEN: ${{ github.token }}
        run: |
          message="$(cat .sdd/commit-message.txt)"
          rm -rf .sdd/diagnostics
          rm -f .sdd/ready .sdd/payload.tar.gz.b64.* .sdd/next.patch .sdd/next.patch.b64.* .sdd/verify.sh .sdd/commit-message.txt .sdd/task*-reviewed
          rmdir .sdd 2>/dev/null || true
          git config user.name "OpenAI"
          git config user.email "noreply@openai.com"
          git add -A
          git commit -m "$message"
          git push origin "HEAD:$BRANCH"
          gh workflow run ci.yml --ref "$BRANCH"
