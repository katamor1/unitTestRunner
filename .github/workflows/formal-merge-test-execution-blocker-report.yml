name: Formal Merge Test Execution Blocker Report

on:
  push:
    branches:
      - stage/test-execution-blocker-report-final-merge-20260723
    paths:
      - .merge-trigger/run.txt

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: formal-merge-test-execution-blocker-report
  cancel-in-progress: false

jobs:
  merge:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout final staging branch
        uses: actions/checkout@v4
        with:
          ref: stage/test-execution-blocker-report-final-merge-20260723
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: vscode/extension/package-lock.json

      - name: Prepare verified feature commit from current main
        shell: pwsh
        run: |
          git fetch origin main
          $baseMain = (git rev-parse origin/main).Trim()
          "BASE_MAIN_SHA=$baseMain" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          git reset --hard origin/main
          git clean -fdx

          $hasAnalyzer = Test-Path -LiteralPath .\src\unit_test_runner\execution\blocker_analyzer.py -PathType Leaf
          $hasKind = [bool](Select-String -LiteralPath .\src\unit_test_runner\contracts\kinds.py -SimpleMatch 'TEST_EXECUTION_BLOCKER_REPORT' -ErrorAction SilentlyContinue)
          $hasVsCode = [bool](Select-String -LiteralPath .\vscode\extension\src\extension.ts -SimpleMatch 'testExecutionBlockers' -ErrorAction SilentlyContinue)
          $alreadyMerged = $hasAnalyzer -and $hasKind -and $hasVsCode

          if (-not $alreadyMerged) {
            @'
          import base64
          import gzip
          import hashlib
          import json
          import os
          import re
          import urllib.request
          from pathlib import Path

          repository = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          request = urllib.request.Request(
              f"https://api.github.com/repos/{repository}/issues/45/comments?per_page=100",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              comments = json.load(response)

          pattern = re.compile(
              r"<!-- UTR_BLOCKER_PATCH_PART:(\d)/6 -->\s*"
              r"([A-Za-z0-9+/=]+)\s*"
              r"<!-- /UTR_BLOCKER_PATCH_PART -->"
          )
          parts = {}
          for comment in comments:
              for match in pattern.finditer(str(comment.get("body") or "")):
                  index = int(match.group(1))
                  if index in parts:
                      raise SystemExit(f"duplicate reviewed patch part: {index}")
                  parts[index] = match.group(2)

          if set(parts) != set(range(1, 7)):
              raise SystemExit(f"reviewed patch parts are incomplete: {sorted(parts)}")

          encoded = "".join(parts[index] for index in range(1, 7))
          if len(encoded) != 60472:
              raise SystemExit(f"unexpected reviewed patch base64 length: {len(encoded)}")
          compressed = base64.b64decode(encoded, validate=True)
          compressed_sha = hashlib.sha256(compressed).hexdigest()
          if compressed_sha != "5a1c0e0bff864efa9bfe27258d7c669d0ac0a060337dd49922eb2a2d96b91cba":
              raise SystemExit(f"compressed reviewed patch SHA-256 mismatch: {compressed_sha}")
          patch = gzip.decompress(compressed)
          patch_sha = hashlib.sha256(patch).hexdigest()
          if len(patch) != 217566:
              raise SystemExit(f"unexpected reviewed patch size: {len(patch)}")
          if patch_sha != "7d37623e9551601aeaf26abba4e045f4a333dda40de123361a33026b5b7c8092":
              raise SystemExit(f"raw reviewed patch SHA-256 mismatch: {patch_sha}")

          patch_path = Path(os.environ["RUNNER_TEMP"]) / "test-execution-blocker-report.patch"
          patch_path.write_bytes(patch)
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"FEATURE_PATCH={patch_path}\n")
          print(f"verified reviewed patch: bytes={len(patch)} sha256={patch_sha}")
          '@ | python -
            if ($LASTEXITCODE -ne 0) { throw "Reviewed patch reconstruction failed with exit code $LASTEXITCODE" }

            git apply --check --binary $env:FEATURE_PATCH
            if ($LASTEXITCODE -ne 0) { throw "Reviewed patch does not apply to current main" }
            git apply --binary $env:FEATURE_PATCH
            if ($LASTEXITCODE -ne 0) { throw "Reviewed patch application failed" }

            @'
          from pathlib import Path

          path = Path("tests/test_execution_run_history.py")
          source = path.read_text(encoding="utf-8")
          pairs = (
              (
                  'workspace / "runs" / "run-blocked" / "test_execution_blockers.json"',
                  'workspace.resolve() / "runs" / "run-blocked" / "test_execution_blockers.json"',
              ),
              (
                  'workspace / "runs" / "run-blocked" / "test_execution_blockers.md"',
                  'workspace.resolve() / "runs" / "run-blocked" / "test_execution_blockers.md"',
              ),
          )
          for old, new in pairs:
              if old in source:
                  source = source.replace(old, new)
              elif new not in source:
                  raise SystemExit(f"Windows path assertion was not found: {old}")
          path.write_text(source, encoding="utf-8")
          '@ | python -
            if ($LASTEXITCODE -ne 0) { throw "Windows path normalization failed" }

            Remove-Item -LiteralPath .sdd -Recurse -Force -ErrorAction SilentlyContinue
            Get-ChildItem -LiteralPath .github\workflows -Filter '*test-execution-blocker-report*.yml' -File -ErrorAction SilentlyContinue | Remove-Item -Force
            Remove-Item -LiteralPath .merge-trigger -Recurse -Force -ErrorAction SilentlyContinue

            if (-not (Test-Path -LiteralPath .\src\unit_test_runner\execution\blocker_analyzer.py -PathType Leaf)) {
              throw 'Reviewed feature does not contain blocker_analyzer.py'
            }
            if (-not (Select-String -LiteralPath .\src\unit_test_runner\contracts\kinds.py -SimpleMatch 'TEST_EXECUTION_BLOCKER_REPORT')) {
              throw 'Reviewed feature does not register the blocker artifact kind'
            }
            if (-not (Select-String -LiteralPath .\vscode\extension\src\extension.ts -SimpleMatch 'testExecutionBlockers')) {
              throw 'Reviewed feature does not contain VS Code blocker integration'
            }

            git diff --check
            if ($LASTEXITCODE -ne 0) { throw 'git diff --check failed' }
            git config user.name OpenAI
            git config user.email noreply@openai.com
            git add -A
            if ((git diff --cached --name-only).Count -eq 0) { throw 'Reviewed feature produced no diff against current main' }
            git commit -m 'feat: add test execution blocker reports'
            if ($LASTEXITCODE -ne 0) { throw 'Formal feature commit failed' }
            $featureSha = (git rev-parse HEAD).Trim()
            $parents = @((git rev-list --parents -n 1 HEAD).Split(' ', [System.StringSplitOptions]::RemoveEmptyEntries))
            if ($parents.Count -ne 2 -or $parents[1] -ne $baseMain) {
              throw 'Formal feature commit is not a one-parent child of current main'
            }
            "MERGE_MODE=fast-forward" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            "FEATURE_SHA=$featureSha" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          } else {
            Write-Host "Current main already contains the blocker-report feature: $baseMain"
            "MERGE_MODE=verify-existing" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            "FEATURE_SHA=$baseMain" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }

      - name: Build through the standard distribution script
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build_distribution.ps1
          if ($LASTEXITCODE -ne 0) { throw "Standard distribution build failed with exit code $LASTEXITCODE" }
          if (-not (Test-Path -LiteralPath .\dist\unit-test-runner.exe -PathType Leaf)) {
            throw 'Standard build did not produce dist\unit-test-runner.exe'
          }
          if (-not (Test-Path -LiteralPath .\dist\unit-test-runner-vscode-0.1.0.vsix -PathType Leaf)) {
            throw 'Standard build did not produce dist\unit-test-runner-vscode-0.1.0.vsix'
          }
          if ((git status --porcelain --untracked-files=no).Count -ne 0) {
            git status --short
            throw 'Standard build modified tracked source files'
          }

      - name: Verify the VSIX-bundled CLI is identical
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP 'unit-test-runner-vscode.zip'
          Copy-Item -LiteralPath .\dist\unit-test-runner-vscode-0.1.0.vsix -Destination $archive -Force
          $extract = Join-Path $env:RUNNER_TEMP 'unit-test-runner-vsix'
          Expand-Archive -LiteralPath $archive -DestinationPath $extract -Force
          $bundled = Get-ChildItem -LiteralPath $extract -Recurse -Filter unit-test-runner.exe -File | Select-Object -First 1
          if ($null -eq $bundled) { throw 'The standard VSIX does not contain unit-test-runner.exe' }
          $distHash = (Get-FileHash -LiteralPath .\dist\unit-test-runner.exe -Algorithm SHA256).Hash
          $bundledHash = (Get-FileHash -LiteralPath $bundled.FullName -Algorithm SHA256).Hash
          if ($distHash -ne $bundledHash) {
            throw "The VSIX-bundled CLI differs from the standard dist executable: $distHash != $bundledHash"
          }
          "CLI_SHA256=$distHash" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload verified standard distribution
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-runner-test-execution-blocker-report-distribution
          path: |
            dist/unit-test-runner.exe
            dist/unit-test-runner-vscode-0.1.0.vsix
          if-no-files-found: error
          retention-days: 30

      - name: Publish formal branch and fast-forward main
        shell: pwsh
        run: |
          git push origin HEAD:refs/heads/feat/test-execution-blocker-report-formal --force
          if ($LASTEXITCODE -ne 0) { throw 'Could not publish the formal feature branch' }

          if ($env:MERGE_MODE -eq 'fast-forward') {
            git fetch origin main
            $remoteMain = (git rev-parse origin/main).Trim()
            if ($remoteMain -ne $env:BASE_MAIN_SHA) {
              throw "main changed while the feature was being verified: $env:BASE_MAIN_SHA -> $remoteMain"
            }
            git push origin HEAD:refs/heads/main --force-with-lease=refs/heads/main:$env:BASE_MAIN_SHA
            if ($LASTEXITCODE -ne 0) { throw 'Could not fast-forward main with the verified feature commit' }
          }

          git fetch origin main
          $mergedMain = (git rev-parse origin/main).Trim()
          if ($mergedMain -ne $env:FEATURE_SHA) {
            throw "main does not equal the verified feature commit: $mergedMain != $env:FEATURE_SHA"
          }
          "MERGED_MAIN_SHA=$mergedMain" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Close temporary transfer and recovery pull requests
        shell: pwsh
        run: |
          @'
          import json
          import os
          import urllib.error
          import urllib.request

          repository = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          temporary_heads = {
              "feat/test-execution-blocker-report-standard-build",
              "recovery/blocker-blobs",
              "recovery/tree-225",
              "stage/test-execution-blocker-report-merge",
              "stage/test-execution-blocker-report-final-merge-20260723",
          }
          request = urllib.request.Request(
              f"https://api.github.com/repos/{repository}/pulls?state=open&per_page=100",
              headers=headers,
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              pulls = json.load(response)
          closed = []
          for pull in pulls:
              head = str((pull.get("head") or {}).get("ref") or "")
              if head not in temporary_heads:
                  continue
              number = int(pull["number"])
              body = json.dumps({"state": "closed"}).encode("utf-8")
              patch = urllib.request.Request(
                  f"https://api.github.com/repos/{repository}/pulls/{number}",
                  data=body,
                  headers={**headers, "Content-Type": "application/json"},
                  method="PATCH",
              )
              with urllib.request.urlopen(patch, timeout=30):
                  pass
              closed.append({"number": number, "head": head})
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write("CLOSED_TEMP_PRS=" + json.dumps(closed, separators=(",", ":")) + "\n")
          print(json.dumps({"closed": closed}, indent=2))
          '@ | python -
          if ($LASTEXITCODE -ne 0) { throw 'Temporary PR cleanup failed' }

      - name: Write formal merge status
        shell: pwsh
        run: |
          $status = [ordered]@{
            status = 'merged'
            main_sha = $env:MERGED_MAIN_SHA
            feature_sha = $env:FEATURE_SHA
            merge_mode = $env:MERGE_MODE
            cli_sha256 = $env:CLI_SHA256
            standard_build_script = 'scripts/build_distribution.ps1'
            outputs = @('dist/unit-test-runner.exe', 'dist/unit-test-runner-vscode-0.1.0.vsix')
            closed_temporary_prs = $env:CLOSED_TEMP_PRS | ConvertFrom-Json
            verified_at_utc = (Get-Date).ToUniversalTime().ToString('o')
          }
          $status | ConvertTo-Json -Depth 8 | Out-File -FilePath (Join-Path $env:RUNNER_TEMP 'formal-merge-status.json') -Encoding utf8

      - name: Upload formal merge status
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-runner-test-execution-blocker-report-merge-status
          path: ${{ runner.temp }}/formal-merge-status.json
          if-no-files-found: error
          retention-days: 90
