name: Export SDD Workspace

on:
  pull_request:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Upload isolated workspace
        uses: actions/upload-artifact@v4
        with:
          name: sdd-workspace-${{ github.event.pull_request.head.sha || github.sha }}
          path: .
          include-hidden-files: true
          retention-days: 1
