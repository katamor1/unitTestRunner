name: Apply SDD Task 1

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode/extension/package-lock.json
      - name: Install dependencies
        working-directory: vscode/extension
        run: npm ci
      - name: Apply and verify Task 1
        shell: bash
        run: |
          git apply --check .sdd/task1.patch
          git apply .sdd/task1.patch
          pushd vscode/extension
          npm run compile
          node --test dist/test/canonicalTestSpecPaths.test.js dist/test/adapter.test.js dist/test/cliEnvelope.test.js
          popd
      - name: Commit verified implementation
        shell: bash
        run: |
          rm -f .sdd/task1.patch .github/workflows/export-sdd-workspace.yml
          rmdir .sdd 2>/dev/null || true
          git config user.name "OpenAI"
          git config user.email "noreply@openai.com"
          git add -A
          git commit -m "refactor: use canonical test spec in vscode adapter"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
