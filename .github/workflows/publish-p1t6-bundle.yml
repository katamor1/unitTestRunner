name: Publish Phase 1 Task 6 checkpoint

on:
  push:
    branches:
      - codex/bootstrap-publish-p1t6-c581

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reassemble and verify bundle
        shell: bash
        run: |
          set -euo pipefail
          cat .github/bootstrap/p1t6.bundle.b64.part* \
            | base64 --decode > "$RUNNER_TEMP/p1t6.bundle"
          actual_sha="$(sha256sum "$RUNNER_TEMP/p1t6.bundle" | awk '{print $1}')"
          test "$actual_sha" = "aee95696be58e5102bc2fe26cc8f447b0942de8569be2750e4adf1bde1bb4d57"
          git bundle verify "$RUNNER_TEMP/p1t6.bundle"
          git fetch "$RUNNER_TEMP/p1t6.bundle" \
            refs/heads/codex/p1t6-review-decisions-readiness:refs/remotes/bundle/p1t6
          test "$(git rev-parse refs/remotes/bundle/p1t6)" = \
            "c581d8d2f21762ab99152ccba9e7a2eeb09afcb7"

      - name: Publish task branch
        shell: bash
        run: |
          set -euo pipefail
          git push origin \
            refs/remotes/bundle/p1t6:refs/heads/codex/p1t6-review-decisions-readiness
